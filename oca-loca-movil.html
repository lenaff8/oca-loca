<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>🪿 La Oca Loca</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
.screen{display:none;flex-direction:column;flex:1;padding:14px 18px;animation:fadeIn .3s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--panel);border:1px solid var(--wood);border-radius:16px;padding:18px}
.btn{border:none;border-radius:14px;font-weight:900;cursor:pointer;font-family:inherit;font-size:17px;padding:16px;width:100%;transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-gold{background:var(--gold);color:var(--gold-text);box-shadow:0 4px 18px rgba(var(--glow),.3)}
.label{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--dim);margin-bottom:6px}
input{background:var(--chip-bg);border:1px solid var(--wood);border-radius:12px;padding:14px 16px;color:var(--text);font-size:17px;outline:none;width:100%;font-family:inherit;transition:border-color .15s}
input:focus{border-color:var(--gold)}
input::placeholder{color:var(--status-color)}
#codeIn::placeholder{color:var(--dimmest);font-weight:400}
.tBtn{padding:13px 0;border-radius:12px;border:none;font-weight:900;cursor:pointer;font-size:18px;font-family:inherit;transition:opacity .25s ease,transform .12s}
.tBtn:active{transform:scale(.95)}
.tBtn.dimmed{opacity:.3}
.role-card{border-radius:20px;padding:18px 16px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:0;animation:rolePop .5s cubic-bezier(.2,1.4,.4,1) both}
@keyframes rolePop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.role-card.secret{background:var(--role-secret)}
.role-card.normal{background:var(--role-normal)}
.role-card.chosen{background:var(--role-chosen);box-shadow:0 0 50px rgba(var(--glow),.45)}
.ch-bar{border-radius:14px;padding:14px 16px 18px;text-align:center;animation:slideDown .4s ease both;overflow:visible}
@keyframes slideDown{from{transform:translateY(-16px);opacity:0}to{transform:none;opacity:1}}
.ch-bar.minijuego{background:var(--cat-mini)}.ch-bar.evento{background:var(--cat-evento)}.ch-bar.versus{background:var(--cat-versus)}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.pulse{animation:pulse 2s ease-in-out infinite}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:28px;text-align:center}
.overlay.hidden{display:none}
#secretOverlay{background:var(--bg)}

/* ── Roulette full-screen ── */
#roulOverlay{background:#33354a;transition:background .25s ease}
#roulOverlay.lit{background:#5d64a8}
#roulOverlay.winner{background:var(--gold);animation:winFlash 1.2s ease 2}
@keyframes winFlash{0%,100%{background:var(--gold)}50%{background:#6d74b8}}
#roulOverlay .roul-msg{font-size:20px;font-weight:900;letter-spacing:.1em;color:#9a9db8;transition:color .25s ease}
#roulOverlay.lit .roul-msg{color:#e8eaff}
#roulOverlay.winner .roul-msg{color:var(--gold-text)}
.winner-text{font-size:38px;font-weight:900;color:var(--gold-text);line-height:1.1;animation:winPop .4s cubic-bezier(.2,1.6,.4,1) both}
@keyframes winPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.confetti{position:fixed;width:9px;height:9px;top:-12px;z-index:999;pointer-events:none;animation:confFall linear forwards}
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg)}}


.slot-window{min-height:66px;overflow:visible;position:relative}
.slot-item{min-height:66px;padding:4px 12px;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,5vw,36px);font-weight:900;color:#fff;text-align:center;line-height:1.3}
/* ── Theme variables ── */
:root,[data-theme="dark"]{
  --bg:linear-gradient(180deg,#26272b,#1e1f22 70%);
  --panel:#2b2d31;--card:#313338;--text:#dbdee1;--gold:#5865f2;--gold-text:#fff;
  --wood:#3f4147;--dim:#949ba4;--dimmest:rgba(148,155,164,.18);
  --input-bg:#1e1f22;--chip-bg:#383a40;
  --row-bg:#34363c;--btn-ghost-bg:#383a40;
  --btn-ghost-color:#dbdee1;--btn-ghost-border:#4e5058;
  --status-color:#80848e;
  --kick-bg:#3c2022;--kick-color:#fa777c;
  --cat-mini:#5865f2;--cat-evento:#23a55a;--cat-versus:#da373c;
  --role-normal:linear-gradient(160deg,#383a40,#2b2d31);
  --role-chosen:linear-gradient(160deg,#4752c4,#36408f);
  --role-secret:linear-gradient(160deg,#6b2350,#2e0f22);
  --role-title:#f2f3f5;--role-desc:rgba(219,222,225,.72);
  --role-label:#8b93f8;--role-secret-label:#ff7ab8;
  --glow:88,101,242;
}
[data-theme="light"]{
  --bg:linear-gradient(180deg,#ffffff,#f0f4f8 80%);
  --panel:#ffffff;--card:#fafcff;--text:#3c3c3c;--gold:#58cc02;--gold-text:#fff;
  --wood:#e5e5e5;--dim:#777777;--dimmest:rgba(60,60,60,.12);
  --input-bg:#f7f7f7;--chip-bg:#eef7ff;
  --row-bg:#f5faff;--btn-ghost-bg:#f0f0f0;
  --btn-ghost-color:#4b4b4b;--btn-ghost-border:#dcdcdc;
  --status-color:#9a9a9a;
  --kick-bg:#ffe3e3;--kick-color:#e21b3c;
  --cat-mini:#1cb0f6;--cat-evento:#ff9600;--cat-versus:#e21b3c;
  --role-normal:linear-gradient(160deg,#d9f1ff,#bce5ff);
  --role-chosen:linear-gradient(160deg,#fff3b0,#ffd60a);
  --role-secret:linear-gradient(160deg,#f0deff,#dcc0fa);
  --role-title:#1b4965;--role-desc:rgba(27,73,101,.78);
  --role-label:#1899d6;--role-secret-label:#8b5cf6;
  --glow:28,176,246;
}
#themeToggle{
  position:fixed;bottom:14px;left:14px;z-index:200;
  background:var(--panel);border:1px solid var(--wood);
  border-radius:50%;width:40px;height:40px;cursor:pointer;
  font-size:17px;font-family:inherit;color:var(--text);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.25);transition:transform .15s;
}
#themeToggle:hover{transform:scale(1.1)}

.reveal-btn{background:var(--gold);color:var(--gold-text);border:none;border-radius:12px;padding:14px 22px;font-weight:900;font-size:16px;cursor:pointer;font-family:inherit;transition:transform .1s}
.reveal-btn:active{transform:scale(.95)}
.phrase-box{background:rgba(0,0,0,.25);border-radius:14px;padding:18px;margin-top:10px;font-size:17px;font-weight:700;line-height:1.5;color:#fff}
.word-carousel{margin-top:6px;width:100%}
.word-display{background:rgba(0,0,0,.25);border-radius:16px;padding:28px 16px;font-size:30px;font-weight:900;color:#fff;text-align:center;min-height:90px;display:flex;align-items:center;justify-content:center}
.word-nav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px}
.word-arrow{background:var(--gold);color:var(--gold-text);border:none;border-radius:50%;width:52px;height:52px;font-size:24px;font-weight:900;cursor:pointer;font-family:inherit;flex-shrink:0;transition:transform .1s}
.word-arrow:active{transform:scale(.9)}
.word-arrow:disabled{opacity:.3;cursor:default}
.word-counter{font-size:14px;font-weight:700;color:rgba(255,255,255,.7)}

.timer-display{font-size:52px;font-weight:900;color:#fff;text-align:center;margin:8px 0;font-variant-numeric:tabular-nums}
.timer-btn{background:var(--gold);color:var(--gold-text);border:none;border-radius:12px;padding:14px;font-weight:900;font-size:17px;cursor:pointer;font-family:inherit;width:100%;transition:transform .1s}
.timer-btn:active{transform:scale(.96)}
.timer-result{font-size:15px;font-weight:700;color:#fff;text-align:center;margin-top:10px;line-height:1.5}
.hunt-box{background:rgba(0,0,0,.25);border-radius:16px;padding:22px 18px;margin-top:10px;font-size:24px;font-weight:900;color:#fff;text-align:center;line-height:1.3}

.cipher-display{font-size:26px;font-weight:900;color:#fff;text-align:center;margin:10px 0;letter-spacing:.12em;line-height:1.5;word-break:break-word}
.cipher-info{font-size:13px;color:rgba(255,255,255,.7);text-align:center;margin-bottom:10px}
.cipher-btns{display:flex;gap:8px;margin-top:8px}
.cipher-btn{flex:1;background:var(--gold);color:var(--gold-text);border:none;border-radius:12px;padding:13px;font-weight:900;font-size:15px;cursor:pointer;font-family:inherit;transition:transform .1s}
.cipher-btn:active{transform:scale(.95)}
.cipher-btn.solve{background:#22c55e;color:#fff}
.cipher-btn:disabled{opacity:.35;cursor:default}

.buzzer{width:100%;aspect-ratio:1;max-width:240px;margin:10px auto;border-radius:50%;border:none;font-size:24px;font-weight:900;color:#fff;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:transform .1s,opacity .2s;box-shadow:0 8px 0 rgba(0,0,0,.3)}
.buzzer:active{transform:translateY(6px);box-shadow:0 2px 0 rgba(0,0,0,.3)}
.buzzer.ready{background:radial-gradient(circle at 40% 35%,#ff6b6b,#d63031)}
.buzzer.locked-me{background:radial-gradient(circle at 40% 35%,#22c55e,#16a34a);animation:buzzPulse 1s ease infinite}
.buzzer.locked-other{background:#555;opacity:.6}
.buzzer.vetoed{background:#444;opacity:.45}
@keyframes buzzPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.buzzer-status{text-align:center;font-size:15px;font-weight:700;color:#fff;margin-top:8px;min-height:22px}
.buzzer-timer{text-align:center;font-size:40px;font-weight:900;color:var(--gold);margin-top:4px}

.letter-box{background:rgba(0,0,0,.25);border-radius:18px;padding:24px;margin-top:10px;text-align:center}
.letter-big{font-size:72px;font-weight:900;color:#fff;line-height:1}
.color-box{border-radius:18px;padding:28px 18px;margin-top:10px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.color-swatch{width:90px;height:90px;border-radius:50%;border:4px solid rgba(255,255,255,.6);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.color-name{font-size:26px;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)}

.bodypart-box{background:rgba(0,0,0,.25);border-radius:18px;padding:24px 18px;margin-top:10px;text-align:center}
.bodypart-big{font-size:32px;font-weight:900;color:#fff;line-height:1.2;margin-top:6px}

.humm-btn{background:var(--gold);color:var(--gold-text);border:none;border-radius:14px;padding:16px;font-weight:900;font-size:17px;cursor:pointer;font-family:inherit;width:100%;margin-top:8px;transition:transform .1s}
.humm-btn:active{transform:scale(.96)}
.humm-btn.stop{background:#22c55e;color:#fff}
.humm-timer{font-size:46px;font-weight:900;color:var(--gold);text-align:center;margin:8px 0;font-variant-numeric:tabular-nums}

.power-btns{display:flex;gap:8px;margin-top:12px;width:100%}
.power-btn{flex:1;border:none;border-radius:12px;padding:12px 8px;font-weight:900;font-size:13px;cursor:pointer;font-family:inherit;color:#fff;transition:transform .1s;line-height:1.3}
.power-btn:active{transform:scale(.95)}
.power-btn:disabled{opacity:.35;cursor:default}
.power-wild{background:#8b5cf6}
.power-steal{background:#f59e0b;color:#1a1200}
</style>
</head>
<body>
<button id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>

<div id="sJoin" class="screen active">
  <div style="text-align:center;margin:10px 0 14px">
    <div style="font-size:40px">🪿</div>
    <h1 style="font-size:1.5rem;font-weight:900;margin-top:4px">La Oca Loca</h1>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px;flex:1">
    <div>
      <div class="label">CÓDIGO DE SALA</div>
      <input id="codeIn" type="text" maxlength="6" placeholder="ABCDEF"
        style="text-transform:uppercase;font-size:1.6rem;font-weight:900;text-align:center;letter-spacing:.18em"
        oninput="this.value=this.value.toUpperCase();onCodeInput(this.value)">
    </div>
    <div>
      <div class="label">TU NOMBRE</div>
      <input id="nameIn" type="text" placeholder="Nombre...">
    </div>
    <div>
      <div class="label">EQUIPO</div>
      <div id="teamBtns" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px"></div>
    </div>
    <div style="flex:1"></div>
    <button class="btn btn-gold" onclick="joinRoom()">Unirse →</button>
    <p id="joinErr" style="color:#f87171;font-size:13px;text-align:center;display:none"></p>
  </div>
</div>

<div id="sWait" class="screen" style="align-items:center;justify-content:center">
  <div style="text-align:center">
    <div style="font-size:72px" class="pulse">🪿</div>
    <h2 style="font-size:1.4rem;font-weight:900;margin-top:16px">Esperando reto...</h2>
    <p style="color:var(--status-color);font-size:14px;margin-top:8px" id="waitInfo"></p>
    <div style="margin-top:20px;background:var(--panel);border-radius:14px;padding:12px 20px;display:inline-block">
      <div class="label">SALA</div>
      <div style="font-size:2rem;font-weight:900;color:var(--gold);letter-spacing:.2em" id="waitCode">------</div>
    </div>
    <p style="color:var(--status-color);font-size:12px;margin-top:16px" id="connInfo">Conectando...</p>
    <button onclick="leaveSession()" style="margin-top:28px;background:var(--btn-ghost-bg);border:1px solid var(--btn-ghost-border);color:var(--dim);border-radius:10px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Cambiar nombre / salir de la sala</button>
  </div>
</div>

<div id="sPlay" class="screen" style="gap:8px;height:100dvh;overflow:hidden">
  <div style="display:flex;justify-content:flex-end">
    <button onclick="leaveSession()" style="background:var(--btn-ghost-bg);border:1px solid var(--btn-ghost-border);color:var(--dim);font-size:12px;cursor:pointer;font-family:inherit;padding:5px 12px;border-radius:8px">Salir de la sala</button>
  </div>
  <div id="chBar" class="ch-bar minijuego">
    <div style="font-size:11px;font-weight:800;letter-spacing:.12em;opacity:.6" id="chType">MINIJUEGO</div>
    <div style="font-size:20px;font-weight:900;color:#fff;margin-top:4px;line-height:1.3;overflow:visible;padding-bottom:2px" id="chName">-</div>
  </div>
  <div class="card" style="font-size:13px;line-height:1.5;color:var(--text);max-height:20vh;overflow-y:auto;flex-shrink:0" id="chDesc"></div>
  <div id="roleCard" class="role-card normal" style="flex:1;min-height:0;overflow-y:auto">
    <div style="font-size:48px;line-height:1" id="roleEmoji">👥</div>
    <div style="font-size:12px;font-weight:900;letter-spacing:.14em;color:var(--role-label)" id="roleLabel">TU ROL</div>
    <div style="font-size:24px;font-weight:900;color:var(--role-title);line-height:1.2" id="roleName">-</div>
    <div style="font-size:15px;line-height:1.65;color:var(--role-desc);max-width:300px" id="roleDesc"></div>
    <div id="roleExtra" style="width:100%;margin-top:8px"></div>
  </div>
</div>

<!-- Secret overlay -->
<div id="secretOverlay" class="overlay hidden">
  <div style="font-size:72px;margin-bottom:16px">🔒</div>
  <h2 style="font-size:1.4rem;font-weight:900;color:#f472b6;margin-bottom:10px">ROL SECRETO</h2>
  <p style="color:var(--status-color);font-size:14px;margin-bottom:32px;line-height:1.6">Solo tú verás esto.<br>No lo enseñes a nadie.</p>
  <button class="btn" style="background:#f472b6;color:#1a0514;max-width:280px" onclick="revealSecret()">Ver mi rol →</button>
</div>

<!-- Roulette full-screen overlay -->
<div id="roulOverlay" class="overlay hidden">
  <div class="roul-msg" id="roulMsg">🎰 SORTEANDO...</div>
  <div id="roulWinnerBox" style="display:none">
    <div style="font-size:64px;margin-bottom:12px">⭐</div>
    <div class="winner-text" id="roulWinnerTxt"></div>
  </div>
</div>

<script>
const TC=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e91e8c','#1abc9c','#e67e22'];
const TEAMS=['A','B','C','D','E','F','G','H'];
let teamDefs=[]; // populated from TV via ntfy
let myName='',myTeam='',myTopic='',mySince=0,es=null,pendingRole=null,pendingChallenge=null;
let cipherState=null;
let buzzerData=null,buzzMyState='ready',buzzTimerRaf=null;
let wildcardsLeft=2,stealsLeft=1,curChallenge=null,roundStarted=false,curRole=null;

window.addEventListener('DOMContentLoaded',()=>{
  renderTeamBtns();
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(code){document.getElementById('codeIn').value=code.toUpperCase();onCodeInput(code);}
  const saved=sessionStorage.getItem('ocaSession');
  if(saved){
    try{
      const s=JSON.parse(saved);
      myName=s.name;myTeam=s.team;myTopic='oca-'+s.code;mySince=Math.floor(Date.now()/1000);
      wildcardsLeft=s.wc!=null?s.wc:2;stealsLeft=s.st!=null?s.st:1;
      document.getElementById('waitInfo').textContent=s.name+' · Equipo '+s.team;
      document.getElementById('waitCode').textContent=s.code;
      announce();subscribe();
      const savedCh=sessionStorage.getItem('ocaChallenge');
      if(savedCh){
        try{const pc=JSON.parse(savedCh);curChallenge=pc;setTimeout(()=>showChallenge(pc),300);}
        catch(e){show('sWait');}
      }else{show('sWait');}
      return;
    }catch(e){sessionStorage.removeItem('ocaSession');}
  }
  if(code)document.getElementById('nameIn').focus();
});

function leaveSession(){
  sessionStorage.removeItem('ocaSession');
  sessionStorage.removeItem('ocaChallenge');
  myTeam='';renderTeamBtns();
  if(es)es.close();
  myName='';myTopic='';
  const saved=document.getElementById('codeIn').value;
  show('sJoin');
}

let codeEs=null,teamsTimeout=null;
let teamPollTimer=null,lastCodeFetched='';
function onCodeInput(val){
  const code=(val||'').toUpperCase().trim();
  // ignore if code hasn't actually changed (e.g. re-fired by toUpperCase reassignment)
  if(code===lastCodeFetched)return;
  lastCodeFetched=code;
  teamDefs=[];myTeam='';
  renderTeamBtns();
  if(teamPollTimer){clearInterval(teamPollTimer);teamPollTimer=null;}
  if(codeEs){codeEs.close();codeEs=null;}
  if(code.length>=6){
    const t='oca-'+code;
    const since=Math.floor(Date.now()/1000)-5;
    dbg('Conectando a '+t+'...');
    codeEs=new EventSource('https://ntfy.sh/'+t+'/sse?since='+since);
    codeEs.onopen=()=>dbg('Canal abierto. Pidiendo equipos...');
    codeEs.onerror=()=>dbg('⚠️ Error de conexión SSE');
    codeEs.addEventListener('message',e=>{
      try{
        const raw=JSON.parse(e.data);
        if(raw.event&&raw.event!=='message')return;
        const d=JSON.parse(raw.message);
        dbg('Recibido: '+(d.type||'?'));
        if(d.type==='teams'){
          if(d.teams&&d.teams.length){
            teamDefs=d.teams;renderTeamBtns();dbg('');
            if(teamPollTimer){clearInterval(teamPollTimer);teamPollTimer=null;}
          }else{dbg('La TV respondió pero sin equipos creados');}
        }
      }catch(err){}
    });
    const ask=()=>{dbg('Pidiendo equipos a la TV...');fetch('https://ntfy.sh/'+t,{method:'POST',body:JSON.stringify({type:'requestTeams'})}).then(()=>dbg('Petición enviada ✓')).catch(()=>dbg('⚠️ No se pudo enviar la petición'));};
    ask();
    // keep asking every 1.5s until we get a non-empty team list
    teamPollTimer=setInterval(()=>{if(teamDefs.length){clearInterval(teamPollTimer);teamPollTimer=null;return;}ask();},1500);
  }
}
function dbg(msg){
  let el=document.getElementById('dbgLine');
  if(!el){
    const host=document.getElementById('teamBtns');
    if(host&&host.parentNode){
      el=document.createElement('div');el.id='dbgLine';
      el.style.cssText='font-size:10px;color:var(--status-color);opacity:.7;margin-top:6px;grid-column:1/-1;word-break:break-word';
      host.parentNode.insertBefore(el,host.nextSibling);
    }
  }
  if(el)el.textContent=msg||'';
}
function renderTeamBtns(){
  const codeVal=(document.getElementById('codeIn')||{}).value||'';
  if(codeVal.trim().length<6){
    document.getElementById('teamBtns').innerHTML='<p style="color:var(--status-color);font-size:12px;grid-column:1/-1;margin:0">Introduce el código de sala para ver los equipos</p>';
    return;
  }
  if(!teamDefs.length){
    document.getElementById('teamBtns').innerHTML='<p style="color:var(--status-color);font-size:12px;grid-column:1/-1;margin:0">Buscando equipos de la sala...</p>';
    return;
  }
  document.getElementById('teamBtns').innerHTML=teamDefs.map(t=>
    `<button class="tBtn ${myTeam===t.id?'sel':(myTeam?'dimmed':'')}" style="background:${t.color};color:#fff;font-size:14px;padding:14px 4px" onclick="pickTeam('${t.id}')">${t.name}</button>`).join('');
}

function joinRoom(){

async function announce(){
  try{await fetch('https://ntfy.sh/'+myTopic,{method:'POST',body:JSON.stringify({type:'join',name:myName,team:myTeam})});}
  catch(e){document.getElementById('connInfo').textContent='Sin conexión. Comprueba el WiFi.';}

function subscribe(){
  if(es)es.close();
  es=new EventSource('https://ntfy.sh/'+myTopic+'/sse?since='+mySince);
  es.onopen=()=>{document.getElementById('connInfo').textContent='✓ Conectado';};
  es.onerror=()=>{document.getElementById('connInfo').textContent='Reconectando...';setTimeout(subscribe,3000);};
  es.addEventListener('message',onMsg);
}

function onMsg(e){
  try{
    const d=JSON.parse(JSON.parse(e.data).message);
    if(d.type==='challenge'){
      curChallenge=d;
      sessionStorage.setItem('ocaChallenge',JSON.stringify(d));
      if(d.roulette){playRoulette(d);}
      else{showChallenge(d);}
    }else if(d.type==='teams'){teamDefs=d.teams;renderTeamBtns();}
    else if(d.type==='cipherUpdate'){
      if(cipherState){cipherState.revealed=d.revealed;renderCipher();}
    }
    else if(d.type==='buzzState'){updateBuzzer(d.state);}
    else if(d.type==='buzzWin'){buzzWin(d.team,d.name);}
    else if(d.type==='timerStart'){timerSyncStart();}
    else if(d.type==='timerPause'){timerSyncStop();}
    else if(d.type==='timerReset'){timerSyncStop();}
    else if(d.type==='timerEnd'){timerSyncEnd();}else if(d.type==='clear'){
      sessionStorage.removeItem('ocaChallenge');
      show('sWait');
    }
  }catch(err){}
}

function playRoulette(d){
  const r=d.roulette;
  const ov=document.getElementById('roulOverlay');
  const msg=document.getElementById('roulMsg');
  const winBox=document.getElementById('roulWinnerBox');
  ov.classList.remove('hidden','winner','lit');
  msg.style.display='block';winBox.style.display='none';
  msg.textContent='🎰 SORTEANDO...';
  const myIdx=r.order.indexOf(myName);
  const amCandidate=myIdx>=0;
  let step=0;
  const total=r.steps.length;
  (function tick(){
    const cur=step%r.order.length;
    const meLit=amCandidate&&cur===myIdx;
    ov.classList.toggle('lit',meLit);
    if(meLit&&navigator.vibrate)navigator.vibrate(30);
    step++;
    if(step<total){setTimeout(tick,r.steps[step]);}
    else{
      ov.classList.remove('lit');
      const winnerName=r.order[r.winnerIdx];
      if(winnerName===myName){
        ov.classList.add('winner');
        msg.style.display='none';
        winBox.style.display='block';
        document.getElementById('roulWinnerTxt').textContent='¡ERES EL ELEGIDO!';
        if(navigator.vibrate)navigator.vibrate([100,60,100,60,250]);
        confetti();
      }else{
        msg.textContent='⭐ '+winnerName.toUpperCase();
        msg.style.color='var(--gold)';
      }
      setTimeout(()=>{
        ov.classList.add('hidden');
        ov.classList.remove('winner');
        msg.style.color='';
        showChallenge(d);
      },2200);
    }
  })();
}

function maskCipher(answer,revealed){
  // First letter shown; rest underscores unless revealed; words separated by wider gap
  const upper=answer.toUpperCase();
  let firstLetterDone=false;
  const chars=[];
  for(let i=0;i<answer.length;i++){
    const ch=answer[i];
    if(ch===' '){chars.push('   ');continue;}
    const isLetter=/[A-Za-zÀ-ÿ0-9]/.test(ch);
    if(!isLetter){chars.push(ch);continue;}
    if(!firstLetterDone){chars.push(upper[i]);firstLetterDone=true;continue;}
    chars.push(revealed.includes(i)?upper[i]:'_');
  }
  return chars.join(' ');
}

function renderCipher(){
  const wrap=document.getElementById('cipherWrap');
  if(!wrap||!cipherState)return;
  const ans=cipherState.answer;
  if(cipherState.revealed==='ALL'){
    wrap.innerHTML='<div class="cipher-info">La película era:</div><div class="cipher-display">'+ans+'</div>';
    return;
  }
  const rev=cipherState.revealed||[];
  // count requested letters (excludes the free first letter)
  const used=rev.length;
  const remaining=3-used;
  let html='<div class="cipher-display">'+maskCipher(ans,rev)+'</div>';
  if(cipherState.isRep){
    html+='<div class="cipher-info">Letras pedidas: '+used+'/3 · cada una resta 1 casilla</div>';
    html+='<div class="cipher-btns">';
    html+='<button class="cipher-btn" id="cipherAsk" '+(remaining<=0?'disabled':'')+'>🔤 Pedir letra</button>';
    html+='<button class="cipher-btn solve" id="cipherSolve">✓ Resolver</button>';
    html+='</div>';
  }else{
    html+='<div class="cipher-info">Solo el representante pide letras y resuelve</div>';
  }
  wrap.innerHTML=html;
  if(cipherState.isRep){
    document.getElementById('cipherAsk').onclick=askLetter;
    document.getElementById('cipherSolve').onclick=solveCipher;
  }
}

function askLetter(){
  const ans=cipherState.answer;
  const rev=cipherState.revealed||[];
  if(rev.length>=3)return;
  // Find hidden letter positions (excluding first letter and non-letters)
  let firstIdx=-1;
  const hidden=[];
  for(let i=0;i<ans.length;i++){
    if(/[A-Za-zÀ-ÿ0-9]/.test(ans[i])){
      if(firstIdx<0){firstIdx=i;continue;}
      if(!rev.includes(i))hidden.push(i);
    }
  }
  if(!hidden.length){alert('No quedan más letras por revelar.');return;}
  const pick=hidden[Math.floor(Math.random()*hidden.length)];
  const newRev=[...rev,pick];
  cipherState.revealed=newRev;
  // Broadcast to TV so everyone updates
  fetch('https://ntfy.sh/'+myTopic,{method:'POST',body:JSON.stringify({type:'cipherReveal',revealed:newRev})}).catch(()=>{});
  renderCipher();
}

function solveCipher(){
  if(confirm('¿Seguro que quieres resolver? Se revelará la película completa para comprobar si habéis acertado.')){
    cipherState.revealed='ALL';
    const wrap=document.getElementById('cipherWrap');
    wrap.innerHTML='<div class="cipher-info">La película era:</div><div class="cipher-display">'+cipherState.answer+'</div>';
    fetch('https://ntfy.sh/'+myTopic,{method:'POST',body:JSON.stringify({type:'cipherReveal',revealed:'ALL'})}).catch(()=>{});
  }
}

function updateBuzzer(state){
  if(!buzzerData)return;
  if(state.locked){
    if(state.lockedTeam===myTeam){
      buzzMyState='locked-me';startBuzzCountdown(state.deadline);
    }else{
      buzzMyState='locked-other';stopBuzzCountdown();
    }
  }else{
    stopBuzzCountdown();
    buzzMyState=state.vetoed&&state.vetoed.includes(myTeam)?'vetoed':'ready';
  }
  renderBuzzer();

function startBuzzCountdown(deadline){

function challengeIsRandom(){
  // Only when the challenge picks specific people (has a chosen role), not 'all'
  if(!curChallenge||!curChallenge.roles)return false;
  return Object.values(curChallenge.roles).some(r=>r.chosen);
}
function amChosen(){
  return curChallenge&&curChallenge.roles&&curChallenge.roles[myName]&&curChallenge.roles[myName].chosen;
}
function chosenIsMyTeammate(){
  if(!curChallenge||!curChallenge.roles)return false;
  const myRole=curChallenge.roles[myName];
  if(!myRole||myRole.chosen)return false;
  const lbl=(myRole.label||'').toUpperCase();
  // must be an active-ish participant of my team, not a pure spectator
  if(lbl==='ESPECTADOR')return false;
  // is there at least one chosen player? (we allow steal if I'm a participant on a team that has a chosen)
  return Object.values(curChallenge.roles).some(r=>r.chosen);
}
function renderPowers(role){
  // remove old
  const ex=document.getElementById('roleExtra');
  let host=document.getElementById('powerHost');
  if(host)host.remove();
  if(!challengeIsRandom())return;
  // If this is a timed challenge and the round already started, powers are locked
  if(role&&role.waitStart&&roundStarted)return;
  host=document.createElement('div');host.id='powerHost';host.style.width='100%';
  let html='';
  if(amChosen()){
    html+='<button class="power-btn power-wild" id="wildBtn" '+(wildcardsLeft<=0?'disabled':'')+'>🃏 Comodín<br><span style="font-size:11px;opacity:.85">No quiero (quedan '+wildcardsLeft+')</span></button>';
  }else if(chosenIsMyTeammate()){
    html+='<button class="power-btn power-steal" id="stealBtn" '+(stealsLeft<=0?'disabled':'')+'>🦹 Robar<br><span style="font-size:11px;opacity:.85">Lo hago yo (queda '+stealsLeft+')</span></button>';
  }
  if(!html)return;
  host.innerHTML='<div class="power-btns">'+html+'</div>';
  // insert after roleExtra
  ex.parentNode.insertBefore(host,ex.nextSibling);
  const wb=document.getElementById('wildBtn');
  if(wb)wb.onclick=()=>{
    if(wildcardsLeft<=0)return;
    wildcardsLeft--;persistPowers();
    fetch('https://ntfy.sh/'+myTopic,{method:'POST',body:JSON.stringify({type:'wildcard',name:myName})}).catch(()=>{});
    if(navigator.vibrate)navigator.vibrate(40);
    host.remove();
  };
  const sb=document.getElementById('stealBtn');
  if(sb)sb.onclick=()=>{
    if(stealsLeft<=0)return;
    stealsLeft--;persistPowers();
    fetch('https://ntfy.sh/'+myTopic,{method:'POST',body:JSON.stringify({type:'steal',name:myName})}).catch(()=>{});
    if(navigator.vibrate)navigator.vibrate([60,40,60]);
    host.remove();
  };
}

    const update=()=>{
      disp.textContent=role.words[i];
      counter.textContent=(i+1)+' / '+role.words.length;
      prev.disabled=i===0;
      next.disabled=i===role.words.length-1;
    };
    prev.onclick=()=>{if(i>0){i--;update();}};
    next.onclick=()=>{if(i<role.words.length-1){i++;update();}};
    nav.appendChild(prev);nav.appendChild(counter);nav.appendChild(next);
    wrap.appendChild(disp);wrap.appendChild(nav);
    ex.appendChild(wrap);
    update();
  }
}

function confetti(){
  const colors=['var(--gold)','#fff','#f39c12'];
  for(let i=0;i<45;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1.8+Math.random()*1.8)+'s';
    c.style.animationDelay=Math.random()*0.6+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
</script>
<script>
(function(){
  var saved=localStorage.getItem('ocaTheme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  window.toggleTheme=function(){
    var next=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('ocaTheme',next);
    var btn=document.getElementById('themeToggle');
    if(btn)btn.textContent=next==='light'?'🌙':'☀️';
  };
  document.addEventListener('DOMContentLoaded',function(){
    var btn=document.getElementById('themeToggle');
    if(btn)btn.textContent=saved==='light'?'🌙':'☀️';
  });
})();
</script>
