<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>🪿 La Oca Loca</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--felt:#0e0e13;--parch:#ece8e0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
.screen{display:none;flex-direction:column;flex:1;padding:20px;animation:fadeIn .3s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--panel);border:1px solid var(--wood);border-radius:16px;padding:18px}
.btn{border:none;border-radius:14px;font-weight:900;cursor:pointer;font-family:inherit;font-size:17px;padding:16px;width:100%;transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-gold{background:var(--gold);color:#1a1200;box-shadow:0 4px 18px rgba(212,175,106,.3)}
.label{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--dim);margin-bottom:6px}
input{background:var(--chip-bg);border:1px solid var(--wood);border-radius:12px;padding:14px 16px;color:var(--text);font-size:17px;outline:none;width:100%;font-family:inherit;transition:border-color .15s}
input:focus{border-color:var(--gold)}
input::placeholder{color:var(--text)44}
.tBtn{padding:16px 0;border-radius:12px;border:3px solid transparent;font-weight:900;cursor:pointer;font-size:18px;font-family:inherit;transition:transform .12s}
.tBtn:active{transform:scale(.92)}
.tBtn.sel{border-color:#fff;transform:scale(1.08)}
.role-card{border-radius:24px;padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:260px;animation:rolePop .5s cubic-bezier(.2,1.4,.4,1) both}
@keyframes rolePop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.role-card.secret{background:var(--role-secret)}
.role-card.normal{background:var(--role-normal)}
.role-card.chosen{background:var(--role-chosen);box-shadow:0 0 50px rgba(212,175,106,.45)}
.ch-bar{border-radius:14px;padding:14px 16px 18px;text-align:center;animation:slideDown .4s ease both;overflow:visible}
@keyframes slideDown{from{transform:translateY(-16px);opacity:0}to{transform:none;opacity:1}}
.ch-bar.minijuego{background:var(--cat-mini)}.ch-bar.evento{background:var(--cat-evento)}.ch-bar.versus{background:var(--cat-versus)}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.pulse{animation:pulse 2s ease-in-out infinite}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:28px;text-align:center}
.overlay.hidden{display:none}
#secretOverlay{background:rgba(0,0,0,.96)}

/* ── Roulette full-screen ── */
#roulOverlay{background:#000;transition:background .07s}
#roulOverlay.lit{background:#fff}
#roulOverlay.winner{background:var(--gold);animation:winFlash .35s ease 5}
@keyframes winFlash{0%,100%{background:var(--gold)}50%{background:#fff}}
#roulOverlay .roul-msg{font-size:20px;font-weight:900;letter-spacing:.1em;color:#666;transition:color .07s}
#roulOverlay.lit .roul-msg{color:#000}
#roulOverlay.winner .roul-msg{color:#1a1200}
.winner-text{font-size:38px;font-weight:900;color:#1a1200;line-height:1.1;animation:winPop .4s cubic-bezier(.2,1.6,.4,1) both}
@keyframes winPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.confetti{position:fixed;width:9px;height:9px;top:-12px;z-index:999;pointer-events:none;animation:confFall linear forwards}
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg)}}


.slot-window{min-height:66px;overflow:visible;position:relative}
.slot-item{min-height:66px;padding:4px 12px;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,5vw,36px);font-weight:900;color:#fff;text-align:center;line-height:1.3}
/* ── Theme variables ── */
:root,[data-theme="dark"]{
  --bg:radial-gradient(ellipse at 40% 0%,#1e1e28,#0e0e13 75%);
  --panel:#1a1a23;--card:#22222e;--text:#ece8e0;--gold:#d4af6a;
  --wood:#32323e;--dim:rgba(236,232,224,.5);--dimmest:rgba(236,232,224,.1);
  --input-bg:rgba(236,232,224,.06);--chip-bg:rgba(236,232,224,.07);
  --row-bg:rgba(236,232,224,.045);--btn-ghost-bg:rgba(236,232,224,.08);
  --btn-ghost-color:#ece8e0;--btn-ghost-border:rgba(236,232,224,.2);
  --status-color:rgba(236,232,224,.35);
  --cat-mini:#34558c;--cat-evento:#9c5c20;--cat-versus:#963060;
  --role-normal:linear-gradient(160deg,#262630,#15151c);
  --role-chosen:linear-gradient(160deg,#4a3a14,#221a08);
  --role-secret:linear-gradient(160deg,#3d0a2e,#1a0514);
  --role-title:#f5f2ea;--role-desc:rgba(236,232,224,.7);
  --role-label:#d4af6a;--role-secret-label:#f472b6;
}
[data-theme="light"]{
  --bg:linear-gradient(160deg,#fff3d6,#ffdfe8 85%);
  --panel:#fffdf6;--card:#fff6e3;--text:#3d2200;--gold:#f59e0b;
  --wood:#ffd9a0;--dim:rgba(61,34,0,.55);--dimmest:rgba(61,34,0,.09);
  --input-bg:rgba(61,34,0,.05);--chip-bg:#ffeccc;
  --row-bg:#fff1d9;--btn-ghost-bg:rgba(61,34,0,.06);
  --btn-ghost-color:#3d2200;--btn-ghost-border:rgba(61,34,0,.16);
  --status-color:rgba(61,34,0,.45);
  --cat-mini:#1da7f0;--cat-evento:#ff9e2c;--cat-versus:#ff5fa2;
  --role-normal:linear-gradient(160deg,#ffe9a8,#ffc6d9);
  --role-chosen:linear-gradient(160deg,#ffd166,#ff9e2c);
  --role-secret:linear-gradient(160deg,#f3d1ff,#e0a3f5);
  --role-title:#3d2200;--role-desc:rgba(61,34,0,.72);
  --role-label:#b45309;--role-secret-label:#9b27af;
}
#themeToggle{
  position:fixed;bottom:14px;left:14px;z-index:200;
  background:var(--panel);border:1px solid var(--wood);
  border-radius:50%;width:40px;height:40px;cursor:pointer;
  font-size:17px;font-family:inherit;color:var(--text);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.25);transition:transform .15s;
}
#themeToggle:hover{transform:scale(1.1)}
</style>
</head>
<body>
<button id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>

<div id="sJoin" class="screen active">
  <div style="text-align:center;margin:36px 0 28px">
    <div style="font-size:56px">🪿</div>
    <h1 style="font-size:1.9rem;font-weight:900;margin-top:8px">La Oca Loca</h1>
  </div>
  <div style="display:flex;flex-direction:column;gap:14px;flex:1">
    <div>
      <div class="label">CÓDIGO DE SALA</div>
      <input id="codeIn" type="text" maxlength="6" placeholder="ABCDEF"
        style="text-transform:uppercase;font-size:2rem;font-weight:900;text-align:center;letter-spacing:.2em"
        oninput="this.value=this.value.toUpperCase();onCodeInput(this.value)">
    </div>
    <div>
      <div class="label">TU NOMBRE</div>
      <input id="nameIn" type="text" placeholder="Nombre...">
    </div>
    <div>
      <div class="label">EQUIPO</div>
      <div id="teamBtns" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px"><p style="color:var(--text)55;font-size:12px;grid-column:1/-1">Introduce el código para ver los equipos disponibles</p></div>
    </div>
    <div style="flex:1"></div>
    <button class="btn btn-gold" onclick="joinRoom()">Unirse →</button>
    <p id="joinErr" style="color:#f87171;font-size:13px;text-align:center;display:none"></p>
  </div>
</div>

<div id="sWait" class="screen" style="align-items:center;justify-content:center">
  <div style="text-align:center">
    <div style="font-size:72px" class="pulse">🪿</div>
    <h2 style="font-size:1.4rem;font-weight:900;margin-top:16px">Esperando reto...</h2>
    <p style="color:var(--text)55;font-size:14px;margin-top:8px" id="waitInfo"></p>
    <div style="margin-top:20px;background:var(--panel);border-radius:14px;padding:12px 20px;display:inline-block">
      <div class="label">SALA</div>
      <div style="font-size:2rem;font-weight:900;color:var(--gold);letter-spacing:.2em" id="waitCode">------</div>
    </div>
    <p style="color:var(--text)33;font-size:12px;margin-top:16px" id="connInfo">Conectando...</p>
    <button onclick="leaveSession()" style="margin-top:28px;background:var(--btn-ghost-bg);border:1px solid var(--btn-ghost-border);color:var(--dim);border-radius:10px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Cambiar nombre / salir de la sala</button>
  </div>
</div>

<div id="sPlay" class="screen" style="gap:12px">
  <div style="display:flex;justify-content:flex-end">
    <button onclick="leaveSession()" style="background:var(--btn-ghost-bg);border:1px solid var(--btn-ghost-border);color:var(--dim);font-size:12px;cursor:pointer;font-family:inherit;padding:5px 12px;border-radius:8px">Salir de la sala</button>
  </div>
  <div id="chBar" class="ch-bar minijuego">
    <div style="font-size:11px;font-weight:800;letter-spacing:.12em;opacity:.6" id="chType">MINIJUEGO</div>
    <div style="font-size:20px;font-weight:900;color:#fff;margin-top:4px;line-height:1.3;overflow:visible;padding-bottom:2px" id="chName">-</div>
  </div>
  <div class="card" style="font-size:14px;line-height:1.7;color:var(--text)cc" id="chDesc"></div>
  <div id="roleCard" class="role-card normal" style="flex:1">
    <div style="font-size:70px;line-height:1" id="roleEmoji">👥</div>
    <div style="font-size:12px;font-weight:900;letter-spacing:.14em;color:var(--role-label)" id="roleLabel">TU ROL</div>
    <div style="font-size:28px;font-weight:900;color:var(--role-title);line-height:1.2" id="roleName">-</div>
    <div style="font-size:15px;line-height:1.65;color:var(--role-desc);max-width:300px" id="roleDesc"></div>
  </div>
</div>

<!-- Secret overlay -->
<div id="secretOverlay" class="overlay hidden">
  <div style="font-size:72px;margin-bottom:16px">🔒</div>
  <h2 style="font-size:1.4rem;font-weight:900;color:#f472b6;margin-bottom:10px">ROL SECRETO</h2>
  <p style="color:var(--text)77;font-size:14px;margin-bottom:32px;line-height:1.6">Solo tú verás esto.<br>No lo enseñes a nadie.</p>
  <button class="btn" style="background:#f472b6;color:#1a0514;max-width:280px" onclick="revealSecret()">Ver mi rol →</button>
</div>

<!-- Roulette full-screen overlay -->
<div id="roulOverlay" class="overlay hidden">
  <div class="roul-msg" id="roulMsg">🎰 SORTEANDO...</div>
  <div id="roulWinnerBox" style="display:none">
    <div style="font-size:64px;margin-bottom:12px">⭐</div>
    <div class="winner-text" id="roulWinnerTxt"></div>
  </div>
</div>

<script>
const TC=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e91e8c','#1abc9c','#e67e22'];
const TEAMS=['A','B','C','D','E','F','G','H'];
let teamDefs=[]; // populated from TV via ntfy
let myName='',myTeam='',myTopic='',mySince=0,es=null,pendingRole=null,pendingChallenge=null;

window.addEventListener('DOMContentLoaded',()=>{
  renderTeamBtns();
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(code){document.getElementById('codeIn').value=code.toUpperCase();onCodeInput(code);}
  const saved=localStorage.getItem('ocaSession');
  if(saved){
    try{
      const s=JSON.parse(saved);
      myName=s.name;myTeam=s.team;myTopic='oca-'+s.code;mySince=Math.floor(Date.now()/1000);
      document.getElementById('waitInfo').textContent=s.name+' · Equipo '+s.team;
      document.getElementById('waitCode').textContent=s.code;
      const savedCh=localStorage.getItem('ocaChallenge');
      if(savedCh){
        try{showChallenge(JSON.parse(savedCh));}
        catch(e){show('sWait');}
      }else{show('sWait');}
      announce();subscribe();
      return;
    }catch(e){localStorage.removeItem('ocaSession');}
  }
  if(code)document.getElementById('nameIn').focus();
});

function leaveSession(){
  localStorage.removeItem('ocaSession');
  localStorage.removeItem('ocaChallenge');
  if(es)es.close();
  myName='';myTopic='';
  const saved=document.getElementById('codeIn').value;
  show('sJoin');
}

let codeEs=null,teamsTimeout=null;
function onCodeInput(val){
  if(val.length>=4){
    // subscribe temporarily to get teams
    const t='oca-'+val.toUpperCase();
    if(codeEs)codeEs.close();
    const since=Math.floor(Date.now()/1000);
    codeEs=new EventSource('https://ntfy.sh/'+t+'/sse?since='+since);
    codeEs.addEventListener('message',e=>{
      try{const d=JSON.parse(JSON.parse(e.data).message);if(d.type==='teams'){teamDefs=d.teams;renderTeamBtns();if(codeEs){codeEs.close();codeEs=null;}if(teamsTimeout)clearTimeout(teamsTimeout);}}catch(err){}
    });
    // Request teams
    setTimeout(()=>{fetch('https://ntfy.sh/'+t,{method:'POST',body:JSON.stringify({type:'requestTeams'})}).catch(()=>{});},300);
    // Fallback after 3s: show defaults
    if(teamsTimeout)clearTimeout(teamsTimeout);
    teamsTimeout=setTimeout(()=>{if(!teamDefs.length){teamDefs=TEAMS.map((id,i)=>({id,name:'Equipo '+id,color:['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e91e8c','#1abc9c','#e67e22'][i]}));renderTeamBtns();}},3000);
  }
}
function renderTeamBtns(){
  const defs=teamDefs.length?teamDefs:TEAMS.map((id,i)=>({id,name:'Equipo '+id,color:TC[i]}));
  document.getElementById('teamBtns').innerHTML=defs.map(t=>
    `<button class="tBtn ${myTeam===t.id?'sel':''}" style="background:${t.color};color:#fff;font-size:14px;padding:14px 4px" onclick="pickTeam('${t.id}')">${t.name}</button>`).join('');
}
function pickTeam(t){myTeam=t;renderTeamBtns();if(navigator.vibrate)navigator.vibrate(15);}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('sJoin').classList.contains('active'))joinRoom();});

function joinRoom(){
  const code=document.getElementById('codeIn').value.trim().toUpperCase();
  const name=document.getElementById('nameIn').value.trim();
  const err=document.getElementById('joinErr');
  if(!code||code.length<4){err.textContent='Introduce el código de sala.';err.style.display='block';return;}
  if(!name){err.textContent='Escribe tu nombre.';err.style.display='block';return;}
  if(!myTeam){err.textContent='Selecciona tu equipo.';err.style.display='block';return;}
  err.style.display='none';
  myName=name;myTopic='oca-'+code;mySince=Math.floor(Date.now()/1000);
  localStorage.setItem('ocaSession',JSON.stringify({code,name,team:myTeam}));
  const tDef=teamDefs.find(t=>t.id===myTeam);
  const tName=tDef?tDef.name:'Equipo '+myTeam;
  document.getElementById('waitInfo').textContent=name+' · '+tName;
  document.getElementById('waitCode').textContent=code;
  show('sWait');announce();subscribe();
}

async function announce(){
  try{await fetch('https://ntfy.sh/'+myTopic,{method:'POST',body:JSON.stringify({type:'join',name:myName,team:myTeam})});}
  catch(e){document.getElementById('connInfo').textContent='Sin conexión. Comprueba el WiFi.';}
}

function subscribe(){
  if(es)es.close();
  es=new EventSource('https://ntfy.sh/'+myTopic+'/sse?since='+mySince);
  es.onopen=()=>{document.getElementById('connInfo').textContent='✓ Conectado';};
  es.onerror=()=>{document.getElementById('connInfo').textContent='Reconectando...';setTimeout(subscribe,3000);};
  es.addEventListener('message',onMsg);
}

function onMsg(e){
  try{
    const d=JSON.parse(JSON.parse(e.data).message);
    if(d.type==='challenge'){
      localStorage.setItem('ocaChallenge',JSON.stringify(d));
      if(d.roulette){playRoulette(d);}
      else{showChallenge(d);}
    }else if(d.type==='teams'){teamDefs=d.teams;renderTeamBtns();}else if(d.type==='clear'){
      localStorage.removeItem('ocaChallenge');
      show('sWait');
    }
  }catch(err){}
}

// ── Roulette: full-screen flash like a physical wheel ──
function playRoulette(d){
  const r=d.roulette;
  const ov=document.getElementById('roulOverlay');
  const msg=document.getElementById('roulMsg');
  const winBox=document.getElementById('roulWinnerBox');
  ov.classList.remove('hidden','winner','lit');
  msg.style.display='block';winBox.style.display='none';
  msg.textContent='🎰 SORTEANDO...';
  const myIdx=r.order.indexOf(myName);
  const amCandidate=myIdx>=0;
  let step=0;
  const total=r.steps.length;
  (function tick(){
    const cur=step%r.order.length;
    const meLit=amCandidate&&cur===myIdx;
    ov.classList.toggle('lit',meLit);
    if(meLit&&navigator.vibrate)navigator.vibrate(30);
    step++;
    if(step<total){setTimeout(tick,r.steps[step]);}
    else{
      ov.classList.remove('lit');
      const winnerName=r.order[r.winnerIdx];
      if(winnerName===myName){
        ov.classList.add('winner');
        msg.style.display='none';
        winBox.style.display='block';
        document.getElementById('roulWinnerTxt').textContent='¡ERES EL ELEGIDO!';
        if(navigator.vibrate)navigator.vibrate([100,60,100,60,250]);
        confetti();
      }else{
        msg.textContent='⭐ '+winnerName.toUpperCase();
        msg.style.color='var(--gold)';
      }
      setTimeout(()=>{
        ov.classList.add('hidden');
        ov.classList.remove('winner');
        msg.style.color='';
        showChallenge(d);
      },2200);
    }
  })();
}

function showChallenge(d){
  const labels={minijuego:'🎮 MINIJUEGO',evento:'⚡ EVENTO',versus:'⚔️ VERSUS'};
  document.getElementById('chType').textContent=labels[d.ctype]||d.ctype.toUpperCase();
  document.getElementById('chName').textContent=d.name;
  document.getElementById('chDesc').textContent=d.desc;
  document.getElementById('chBar').className='ch-bar '+(d.ctype||'minijuego');
  show('sPlay');
  const role=d.roles&&d.roles[myName];
  if(role){
    if(role.isSecret){pendingRole=role;document.getElementById('secretOverlay').classList.remove('hidden');}
    else applyRole(role,false);
  }else applyRole({label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa la prueba.'},false);
}

function revealSecret(){
  document.getElementById('secretOverlay').classList.add('hidden');
  applyRole(pendingRole,true);pendingRole=null;
}

function applyRole(role,secret){
  const card=document.getElementById('roleCard');
  card.style.animation='none';void card.offsetWidth;card.style.animation='';
  card.className='role-card '+(secret?'secret':role.chosen?'chosen':'normal');
  document.getElementById('roleEmoji').textContent=role.emoji||'👥';
  const lbl=document.getElementById('roleLabel');
  lbl.textContent=secret?'⚠️ ROL SECRETO':'TU ROL';
  lbl.style.color=secret?'var(--role-secret-label)':'var(--role-label)';
  document.getElementById('roleName').textContent=role.label||'-';
  document.getElementById('roleDesc').textContent=role.roleDesc||'';
}

function confetti(){
  const colors=['#d4af6a','#fff','#f39c12'];
  for(let i=0;i<45;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1.8+Math.random()*1.8)+'s';
    c.style.animationDelay=Math.random()*0.6+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
</script>
<script>
(function(){
  var saved=localStorage.getItem('ocaTheme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  window.toggleTheme=function(){
    var next=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('ocaTheme',next);
    var btn=document.getElementById('themeToggle');
    if(btn)btn.textContent=next==='light'?'🌙':'☀️';
  };
  document.addEventListener('DOMContentLoaded',function(){
    var btn=document.getElementById('themeToggle');
    if(btn)btn.textContent=saved==='light'?'🌙':'☀️';
  });
})();
</script>
</body>
</html>
