<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🪿 La Oca Loca — TV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
.screen{display:none;padding:20px;max-width:1400px;margin:0 auto}.screen.active{display:block}
.card{background:var(--panel);border:1px solid var(--wood);border-radius:16px;padding:18px}
.btn{border:none;border-radius:12px;font-weight:900;cursor:pointer;font-family:inherit;transition:transform .12s,opacity .15s}
.btn:hover{opacity:.9;transform:translateY(-1px)}.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:var(--gold-text);padding:14px 28px;font-size:16px;box-shadow:0 4px 18px rgba(var(--glow),.35)}
.btn-back{background:var(--btn-ghost-bg);color:var(--btn-ghost-color);padding:10px 18px;font-size:13px;border:1px solid var(--btn-ghost-border)}
.code{font-size:clamp(1.8rem,6vw,3.2rem);font-weight:900;letter-spacing:.08em;color:var(--gold);text-align:center;line-height:1.1;text-shadow:0 0 24px rgba(var(--glow),.4);white-space:nowrap;overflow:hidden}
.label{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--dim);margin-bottom:6px}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;display:inline-block}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--chip-bg);border-radius:9px;padding:6px 12px;margin:3px;font-size:13px;animation:popIn .3s ease both}
@keyframes popIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.role-row{display:flex;align-items:center;gap:9px;padding:8px 12px;background:var(--row-bg);border-radius:9px;margin-bottom:4px;font-size:13px;animation:slideIn .35s ease both}
@keyframes slideIn{from{transform:translateX(-14px);opacity:0}to{transform:none;opacity:1}}
.status{font-size:11px;color:var(--status-color);text-align:center;margin-top:4px}
.grid2{display:grid;gap:18px;margin-top:16px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
@media(min-width:900px){.gridLobby{grid-template-columns:300px 1fr}.gridGame{grid-template-columns:280px 1fr}}

/* ── Wizard ── */
.wizard-q{font-size:24px;font-weight:900;color:var(--text);text-align:center;margin-bottom:24px;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.cat-card{border:none;border-radius:20px;padding:36px 20px;cursor:pointer;font-family:inherit;text-align:center;color:#fff;transition:transform .15s,box-shadow .15s;animation:fadeUp .35s ease both}
.cat-card:hover{transform:translateY(-4px) scale(1.02)}
.cat-card:active{transform:scale(.97)}
.cat-emoji{font-size:56px;display:block;margin-bottom:10px}
.cat-name{font-size:22px;font-weight:900;letter-spacing:.02em}
.cat-sub{font-size:12px;opacity:.65;margin-top:6px;line-height:1.5}
.team-big{border:3px solid transparent;border-radius:18px;padding:28px 14px;cursor:pointer;font-family:inherit;color:#fff;font-size:26px;font-weight:900;transition:transform .12s;min-width:110px;animation:fadeUp .3s ease both}
.team-big:hover{transform:scale(1.06)}.team-big:active{transform:scale(.95)}
.team-big small{display:block;font-size:11px;font-weight:700;opacity:.7;margin-top:4px}

/* ── Slot + roulette + confetti (unchanged visuals) ── */

.slot-window{min-height:66px;overflow:visible;position:relative}
.slot-item{min-height:66px;padding:4px 12px;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,5vw,36px);font-weight:900;color:#fff;text-align:center;line-height:1.3}
@keyframes chPop{0%{transform:scale(.7) rotate(-2deg);opacity:0}60%{transform:scale(1.04) rotate(.5deg)}100%{transform:scale(1) rotate(0)}}
.ch-reveal{animation:chPop .55s cubic-bezier(.2,1.4,.4,1) both}
@keyframes glowPulse{0%,100%{box-shadow:0 0 24px rgba(var(--glow),.25)}50%{box-shadow:0 0 48px rgba(var(--glow),.55)}}
.roul-name{padding:12px 22px;border-radius:14px;font-size:22px;font-weight:900;background:var(--chip-bg);border:2px solid transparent;transition:all .08s;color:var(--dim)}
.roul-name.lit{background:var(--gold);color:var(--gold-text);transform:scale(1.12);box-shadow:0 0 36px rgba(var(--glow),.7);border-color:#fff}
.roul-name.winner{background:var(--gold);color:var(--gold-text);transform:scale(1.25);box-shadow:0 0 60px rgba(var(--glow),.95);border-color:#fff;animation:winnerBounce .5s ease 3}
@keyframes winnerBounce{0%,100%{transform:scale(1.25)}50%{transform:scale(1.35)}}
.confetti{position:fixed;width:10px;height:10px;top:-12px;z-index:999;pointer-events:none;animation:confFall linear forwards}
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg)}}


/* ── Theme variables ── */
:root,[data-theme="dark"]{
  --bg:linear-gradient(180deg,#26272b,#1e1f22 70%);
  --panel:#2b2d31;--card:#313338;--text:#dbdee1;--gold:#5865f2;--gold-text:#fff;
  --wood:#3f4147;--dim:#949ba4;--dimmest:rgba(148,155,164,.18);
  --input-bg:#1e1f22;--chip-bg:#383a40;
  --row-bg:#34363c;--btn-ghost-bg:#383a40;
  --btn-ghost-color:#dbdee1;--btn-ghost-border:#4e5058;
  --status-color:#80848e;
  --kick-bg:#3c2022;--kick-color:#fa777c;
  --cat-mini:#5865f2;--cat-evento:#23a55a;--cat-versus:#da373c;
  --role-normal:linear-gradient(160deg,#383a40,#2b2d31);
  --role-chosen:linear-gradient(160deg,#4752c4,#36408f);
  --role-secret:linear-gradient(160deg,#6b2350,#2e0f22);
  --role-title:#f2f3f5;--role-desc:rgba(219,222,225,.72);
  --role-label:#8b93f8;--role-secret-label:#ff7ab8;
  --glow:88,101,242;
}
[data-theme="light"]{
  --bg:linear-gradient(180deg,#ffffff,#f0f4f8 80%);
  --panel:#ffffff;--card:#fafcff;--text:#3c3c3c;--gold:#58cc02;--gold-text:#fff;
  --wood:#e5e5e5;--dim:#777777;--dimmest:rgba(60,60,60,.12);
  --input-bg:#f7f7f7;--chip-bg:#eef7ff;
  --row-bg:#f5faff;--btn-ghost-bg:#f0f0f0;
  --btn-ghost-color:#4b4b4b;--btn-ghost-border:#dcdcdc;
  --status-color:#9a9a9a;
  --kick-bg:#ffe3e3;--kick-color:#e21b3c;
  --cat-mini:#1cb0f6;--cat-evento:#ff9600;--cat-versus:#e21b3c;
  --role-normal:linear-gradient(160deg,#d9f1ff,#bce5ff);
  --role-chosen:linear-gradient(160deg,#fff3b0,#ffd60a);
  --role-secret:linear-gradient(160deg,#f0deff,#dcc0fa);
  --role-title:#1b4965;--role-desc:rgba(27,73,101,.78);
  --role-label:#1899d6;--role-secret-label:#8b5cf6;
  --glow:28,176,246;
}
#themeToggle{
  position:fixed;bottom:14px;left:14px;z-index:200;
  background:var(--panel);border:1px solid var(--wood);
  border-radius:50%;width:40px;height:40px;cursor:pointer;
  font-size:17px;font-family:inherit;color:var(--text);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.25);transition:transform .15s;
}
#themeToggle:hover{transform:scale(1.1)}
</style>
</head>
<body>
<div id="qrModal" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;cursor:pointer">
  <img id="qrModalImg" style="width:min(80vw,80vh);height:min(80vw,80vh);border-radius:20px" alt="QR grande">
</div>
<button id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>

<div id="sLobby" class="screen active">
  <div class="grid2 gridLobby">
    <div>
      <div class="card" style="text-align:center;padding:24px 16px;animation:glowPulse 3s ease-in-out infinite">
        <div class="label">CÓDIGO DE SALA</div>
        <div class="code" id="codeDisp">------</div>
        <p style="color:var(--status-color);font-size:12px;margin-top:8px">Escanea para unirte</p>
        <div id="qrBox" style="margin-top:12px;display:flex;justify-content:center"></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="label" style="margin-bottom:10px">EQUIPOS (<span id="teamCountL">0</span>)</div>
        <div id="teamDefList"></div>
        <div style="display:flex;gap:8px;margin-top:10px;align-items:stretch">
          <input id="newTeamName" type="text" placeholder="Nombre del equipo..."
            style="flex:1;min-width:0;background:var(--chip-bg);border:1px solid var(--wood);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit"
            onkeydown="if(event.key==='Enter')addTeam()">
          <button class="btn btn-gold" style="flex-shrink:0;padding:10px 16px;font-size:14px;white-space:nowrap;box-shadow:none" onclick="addTeam()">+ Añadir</button>
        </div>
        <div id="teamListL" style="display:none"></div>
      </div>
      <button class="btn btn-gold" style="width:100%;margin-top:12px;font-size:18px;padding:16px" onclick="goGame()">▶ Empezar partida</button>
      <button class="btn btn-back" style="width:100%;margin-top:8px" onclick="newRoom()">↻ Nueva sala</button>
    </div>
    <div class="card">
      <div class="label">JUGADORES CONECTADOS (<span id="pCountL">0</span>)</div>
      <div id="pListL" style="margin-top:10px"></div>
    </div>
  </div>
</div>

<div id="sGame" class="screen">
  <div class="grid2 gridGame">
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card" style="text-align:center;padding:12px">
        <div style="display:flex;align-items:center;justify-content:center;gap:14px">
          <div>
            <div class="label">SALA</div>
            <div style="font-size:1.8rem;font-weight:900;color:var(--gold);letter-spacing:.1em" id="codeSmall"></div>
          </div>
          <div id="qrSmall"></div>
        </div>
        <div class="status" id="connStatus">●  conectado</div>
        <button class="btn btn-back" style="width:100%;margin-top:8px;font-size:11px;padding:7px" onclick="newRoom()">↻ Nueva sala</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div id="mainPanel" class="card" style="min-height:380px;display:flex;flex-direction:column;justify-content:center"></div>
      <div id="rolesCard" class="card" style="display:none">
        <div class="label">ROLES (visibles en los móviles)</div>
        <div id="roleList" style="margin-top:8px"></div>
      </div>
      <div class="card">
        <div class="label">JUGADORES (<span id="pCountG">0</span>)</div>
        <div id="pListG" style="margin-top:6px"></div>
      </div>
    </div>
  </div>
</div>

<script>
const TC=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e91e8c','#1abc9c','#e67e22'];

minijuego:[

 {n:"El Artista Invisible",d:"A un jugador se le muestra una palabra y debe DIBUJAR ese objeto con el dedo en la espalda de un compañero (ej: si pone 'gato', dibuja un gato, no la palabra). Solo ese compañero adivina, sin mirar.",rt:"artist_back"},

 {n:"Sigue la Canción",d:"El moderador pone una canción y la pausa de golpe. El equipo debe continuar cantando el trozo que sigue. Si lo clavan, superado.",rt:"all"},

 {n:"Sin Vista",d:"Con los ojos vendados, coloca un papel en el punto exacto que te indica el equipo con instrucciones verbales.",rt:"actor",al:"CIEGO",ad:"Te vendan los ojos. Sigue las instrucciones de tu equipo.",bl:"GUÍA",bd:"Guiad al ciego solo con palabras."},
 {n:"Mente Colmena",d:"Dos jugadores dicen una palabra a la vez. Buscan una que conecte ambas, otra vez a la vez. Siguen hasta decir la MISMA palabra. Tienen máximo 10 turnos.",rt:"pair"},
 {n:"Es un 10 pero...",d:"A un jugador se le asigna en secreto un número del 1 al 9. Debe describir a alguien diciendo 'es un 10 pero...' con un defecto tan absurdo que su nivel de atractivo baje justo a ese número. Su equipo adivina qué número le tocó.",rt:"number",al:"DESCRIPTOR",ad:"Este es tu número secreto. Describe el defecto para que tu equipo adivine cuánto baja del 10.",bl:"JURADO",bd:"Adivinad qué número secreto le tocó por lo absurdo del defecto."},

 {n:"Striptease con Globo",d:"Coloca un globo entre tu cuerpo y tu camiseta. Quítatela sin que caiga. Sin usar las manos.",rt:"actor",al:"INTÉRPRETE",ad:"Tú te quitas la camiseta sin que caiga el globo.",bl:"JURADO",bd:"Decidid si el globo ha tocado el suelo."},

 {n:"Cara de Piedra",d:"Un representante de cada equipo llena la boca de agua. Sus equipos intentan hacerles reír.",rt:"rep",al:"CARA DE PIEDRA",ad:"Llena la boca de agua. 60 segundos sin reírte.",bl:"COMEDIANTE",bd:"Haced reír al representante rival. Sin tocarlo."},
 {n:"Duelo de Fuerza",d:"Un representante por equipo. El que más flexiones seguidas haga sin parar, gana.",rt:"rep",al:"ATLETA",ad:"Tú haces las flexiones.",bl:"ÁRBITRO",bd:"Contad las flexiones."},

function subscribe(){
  if(es)es.close();
  es=new EventSource('https://ntfy.sh/'+topic+'/sse?since='+since);
  es.addEventListener('message',onMsg);
  es.onerror=()=>{document.getElementById('connStatus').textContent='● reconectando...';setTimeout(subscribe,3000);};
  es.onopen=()=>{const el=document.getElementById('connStatus');if(el)el.textContent='●  conectado';};
}
function tvDbg(msg){
  let el=document.getElementById('tvDbgLine');
  if(!el){
    el=document.createElement('div');el.id='tvDbgLine';
    el.style.cssText='position:fixed;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#0f0;font-size:13px;padding:6px 14px;border-radius:8px;z-index:9999;font-family:monospace';
    document.body.appendChild(el);
  }
  el.textContent=msg;
  clearTimeout(el._t);el._t=setTimeout(()=>{el.textContent='';},4000);
}
function onMsg(e){
  try{
    const d=JSON.parse(JSON.parse(e.data).message);
    if(d.type==='requestTeams'){pub({type:'teams',teams:teamDefs});return;}
    if(d.type==='cipherReveal'){pub({type:'cipherUpdate',revealed:d.revealed});return;}
    if(d.type==='buzzPress'){handleBuzz(d.name,d.team);return;}
    if(d.type==='buzzResult'){handleBuzzResult(d.success);return;}
    if(d.type==='buzzSync'){pub({type:'buzzState',state:buzzer});return;}
    if(d.type==='hummStart'){hummStart(d.team);return;}
    if(d.type==='hummStop'){hummStop(d.team,d.time);return;}
    if(d.type==='wildcard'){handleWildcard(d.name);return;}
    if(d.type==='steal'){handleSteal(d.name);return;}
    if(d.type==='join'){
      players[d.name]={name:d.name,team:d.team};saveTV();renderPlayers();
      // Only re-send teams + refresh wizard when we're idle (lobby or wizard category choice),
      // never while a challenge/timer/buzzer is on screen.
      const idle=!lastCh && wState==='cat';
      if(idle){pub({type:'teams',teams:teamDefs});if(document.getElementById('sGame').classList.contains('active'))renderWizard();}
    }
  }catch(err){}
}
async function pub(data){try{await fetch('https://ntfy.sh/'+topic,{method:'POST',body:JSON.stringify(data)});}catch(e){}}

function teams(){return [...new Set(Object.values(players).map(p=>p.team))].sort();}

function buildGroupedList(ps,showKick){
  if(!ps.length)return '<p style="color:var(--status-color);font-size:13px">Sin jugadores aún</p>';
  let h='';
  teamDefs.forEach(function(t){
    const tp=ps.filter(function(p){return p.team===t.id;});
    if(!tp.length)return;
    h+='<div style="margin-bottom:10px">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">';
    h+='<div class="dot" style="background:'+t.color+';width:14px;height:14px"></div>';
    h+='<span style="font-size:13px;font-weight:900;color:'+t.color+'">'+t.name+'</span>';
    h+='<span style="font-size:11px;color:var(--status-color)">'+tp.length+' jug.</span>';
    h+='</div>';
    tp.forEach(function(p){
      const safe=p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      h+='<div style="display:flex;align-items:center;gap:7px;padding:3px 0 3px 20px;font-size:13px">';
      h+='<span style="flex:1">'+p.name+'</span>';
      if(showKick){
        h+='<button onclick="kickPlayer(\''+safe+'\');" style="background:var(--kick-bg);border:none;color:var(--kick-color);cursor:pointer;font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;font-family:inherit">✕</button>';
      }
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}
function renderPlayers(){
  const ps=Object.values(players);
  document.getElementById('pCountL').textContent=ps.length;
  document.getElementById('pCountG').textContent=ps.length;
  const ts=teams();
  document.getElementById('teamCountL').textContent=ts.length;
  document.getElementById('pListL').innerHTML=buildGroupedList(ps,false);
  document.getElementById('teamListL').innerHTML='';
  document.getElementById('pListG').innerHTML=buildGroupedList(ps,true);
}

function renameTeam(idx){
  const name=prompt('Nuevo nombre:',teamDefs[idx].name);
  if(name&&name.trim()){teamDefs[idx].name=name.trim();saveTeams();}
}
function deleteTeam(id){
  if(Object.values(players).some(p=>p.team===id)){alert('Hay jugadores en este equipo.');return;}
  if(!confirm('¿Eliminar este equipo?'))return;
  teamDefs=teamDefs.filter(t=>t.id!==id);
  // Re-assign IDs to keep them sequential
  teamDefs=teamDefs.map((t,i)=>({...t,id:'ABCDEFGH'[i],color:TC[i]}));
  saveTeams();
}
function renderTeamDefs(){
  const el=document.getElementById('teamDefList');if(!el)return;
  el.innerHTML=teamDefs.map((t,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--dimmest)">
      <div class="dot" style="background:${t.color};width:14px;height:14px;flex-shrink:0"></div>
      <span style="flex:1;font-weight:700;font-size:14px">${t.name}</span>
      <span style="color:var(--status-color);font-size:11px">${Object.values(players).filter(p=>p.team===t.id).length} jug.</span>
      <button onclick="renameTeam(${i})" style="background:none;border:none;color:var(--status-color);cursor:pointer;font-size:14px;padding:2px 5px" title="Renombrar">✏️</button>
      <button onclick="deleteTeam('${t.id}')" style="background:none;border:none;color:#f8717166;cursor:pointer;font-size:14px;padding:2px 5px" title="Eliminar">✕</button>
    </div>`).join('');
}
function saveTV(){
  const code=topic.replace('oca-','');
  localStorage.setItem('ocaTV',JSON.stringify({code,players,inGame:tvInGame,lastCh}));
}
function goGame(){pub({type:'start'});tvInGame=true;show('sGame');wizardReset();saveTV();}
function initTeams(){renderTeamDefs();renderPlayers();}
function newRoom(){
  if(!confirm('¿Crear una sala nueva? Se desconectarán todos los jugadores.'))return;
  pub({type:'clear'});
  localStorage.removeItem('ocaTV');
  // clear the URL hash so a fresh code is generated on reload
  history.replaceState(null,'',location.pathname+location.search);
  location.reload();
}
function kickPlayer(name){
  if(!confirm('¿Eliminar a '+name+' de la lista?'))return;
  delete players[name];saveTV();renderPlayers();
}

// ════ WIZARD ════
function wizardReset(){wState='cat';wType=null;wActive=null;wOpp=null;document.getElementById('rolesCard').style.display='none';renderWizard();}

          <div class="cat-sub">Juega el equipo<br>que tiró el dado</div>

          <div class="cat-sub">Juegan todos<br>los equipos</div>

          <div class="cat-sub">Un equipo<br>reta a otro</div>

    const q=wType==='versus'?'¿Qué equipo reta?':'¿Qué equipo tiró el dado?';
    mp.innerHTML=`
      <div class="wizard-q">${q}</div>
      <div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center">
        ${teamDefs.map((t,i)=>`<button class="team-big" style="background:${t.color};animation-delay:${i*50}ms" onclick="wPickActive('${t.id}')">${t.name}<small>${Object.values(players).filter(p=>p.team===t.id).length} jug.</small></button>`).join('')}
      </div>
      <div style="text-align:center;margin-top:24px"><button class="btn btn-back" onclick="wBack()">← Atrás</button></div>`;

  else if(wState==='opp'){
    mp.innerHTML=`
      <div class="wizard-q">¿A qué equipo retan?</div>

      <div style="text-align:center;margin-top:24px"><button class="btn btn-back" onclick="wBack()">← Atrás</button></div>`;

function wPickCat(t){
  wType=t;
  if(t==='evento'){launch();}
  else{wState='active';renderWizard();}
}
function wPickActive(t){
  wActive=t;
  if(wType==='versus'){wState='opp';renderWizard();}
  else launch();
}
function wPickOpp(t){wOpp=t;launch();}
function wBack(){
  if(wState==='opp'){wState='active';}
  else if(wState==='active'){wState='cat';wType=null;}
  renderWizard();
}

// ════ Launch challenge ════
function launch(){
  if(busy)return;busy=true;
  const pool=CH[wType];
  const ch=pool[Math.floor(Math.random()*pool.length)];
  const ps=Object.values(players);
  let active;
  if(wType==='minijuego')active=ps.filter(p=>p.team===wActive);
  else if(wType==='evento')active=ps;
  else active=ps.filter(p=>p.team===wActive||p.team===wOpp);
  const {roles,roulette}=assignRoles(ch,active,ps,wActive,wOpp);
  if(ch.secs){for(const n in roles){roles[n].waitStart=true;}}
  pub({type:'challenge',name:ch.n,desc:ch.d,ctype:wType,roles,roulette});
  lastCh={ch,type:wType,roles,aT:wActive,oT:wOpp};saveTV();
  if(ch.secs){chTimerTotal=ch.secs;chTimerSecs=ch.secs;chTimerRunning=false;if(chTimer){clearInterval(chTimer);chTimer=null;}}
  if(ch.rt==='buzzer'){setTimeout(()=>{resetBuzzer();renderBuzzerTV();},2600);}
  if(ch.rt==='hotpotato'){hpRemaining=90;hpRunning=false;if(hpTimer){clearInterval(hpTimer);hpTimer=null;}setTimeout(renderHotPotato,2600);}
  if(ch.rt==='humming'){humming={times:{},running:{},starts:{}};setTimeout(renderHumming,2600);}
  if(roulette){
    playTVRoulette(roulette,()=>{finalChallenge(ch,wType);renderRoles(roles,ps);busy=false;});
  }else{
    slotReveal(ch,wType,()=>{renderRoles(roles,ps);busy=false;});
  }
}

function nextRound(){pub({type:'clear'});lastCh=null;if(buzzerTimer){clearInterval(buzzerTimer);buzzerTimer=null;}if(hpTimer){clearInterval(hpTimer);hpTimer=null;}if(chTimer){clearInterval(chTimer);chTimer=null;}saveTV();wizardReset();}

function slotReveal(ch,type,done){
  const bg={minijuego:'var(--cat-mini)',evento:'var(--cat-evento)',versus:'var(--cat-versus)'}[type];
  const em={minijuego:'🎮',evento:'⚡',versus:'⚔️'}[type];
  const lb={minijuego:'MINIJUEGO',evento:'EVENTO',versus:'VERSUS'}[type];
  const names=CH[type].map(c=>c.n);
  const seq=[];
  for(let i=0;i<14;i++)seq.push(names[Math.floor(Math.random()*names.length)]);
  seq.push(ch.n);
  document.getElementById('mainPanel').innerHTML=`<div style="background:${bg};border-radius:16px;padding:40px;text-align:center">
    <div style="font-size:64px">${em}</div>
    <div style="color:rgba(255,255,255,.5);font-size:13px;font-weight:800;letter-spacing:.12em;margin:8px 0">${lb}</div>
    <div class="slot-window"><div id="slotTxt" class="slot-item" style="opacity:.8">···</div></div>
  </div>`;
  let i=0,delay=70;
  (function step(){
    document.getElementById('slotTxt').textContent=seq[i];
    i++;
    if(i<seq.length){delay*=1.18;setTimeout(step,delay);}
    else setTimeout(()=>{finalChallenge(ch,type);done();},400);
  })();
}

function finalChallenge(ch,type){
  const bg={minijuego:'var(--cat-mini)',evento:'var(--cat-evento)',versus:'var(--cat-versus)'}[type];
  const em={minijuego:'🎮',evento:'⚡',versus:'⚔️'}[type];
  const lb={minijuego:'MINIJUEGO',evento:'EVENTO',versus:'VERSUS'}[type];
  let teamLine='';
  const tNameA=teamDefs.find(t=>t.id===wActive)?.name||('Equipo '+wActive);
  const tNameO=teamDefs.find(t=>t.id===wOpp)?.name||('Equipo '+wOpp);
  if(type==='minijuego'&&wActive)teamLine=`<div style="color:rgba(255,255,255,.55);font-size:13px;margin-top:14px">Juega <strong style="color:#fff">${tNameA}</strong></div>`;
  if(type==='versus'&&wActive&&wOpp)teamLine=`<div style="color:rgba(255,255,255,.55);font-size:13px;margin-top:14px"><strong style="color:#fff">${tNameA}</strong> reta a <strong style="color:#fff">${tNameO}</strong></div>`;
  document.getElementById('mainPanel').innerHTML=`
    <div class="ch-reveal" style="background:${bg};border-radius:16px;padding:36px;text-align:center">
      <div style="font-size:60px">${em}</div>
      <div style="color:rgba(255,255,255,.5);font-size:13px;font-weight:800;letter-spacing:.12em;margin:8px 0">${lb}</div>
      <div style="color:#fff;font-size:32px;font-weight:900;margin-bottom:14px;line-height:1.1">${ch.n}</div>
      <div style="color:rgba(255,255,255,.78);font-size:16px;line-height:1.7;max-width:600px;margin:0 auto">${ch.d}</div>
      ${teamLine}
    </div>
    <div id="chTimerHost"></div>
    <button class="btn btn-gold" style="margin-top:14px;width:100%;font-size:17px" onclick="nextRound()">✓ Hecho — Siguiente casilla</button>`;
  if(lastCh&&lastCh.ch.secs){chTimerTotal=lastCh.ch.secs;chTimerSecs=lastCh.ch.secs;chTimerRunning=false;renderChTimer();}
}

function playTVRoulette(r,done){
  document.getElementById('rolesCard').style.display='none';
  document.getElementById('mainPanel').innerHTML=`<div style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">🎰</div>
    <div style="color:var(--gold);font-size:15px;font-weight:900;letter-spacing:.14em;margin-bottom:24px">SORTEANDO...</div>
    <div id="roulNames" style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center"></div>
  </div>`;
  document.getElementById('roulNames').innerHTML=r.order.map((n,i)=>`<div class="roul-name" id="rn${i}">${n}</div>`).join('');
  let step=0;
  (function tick(){
    document.querySelectorAll('.roul-name').forEach(e=>e.classList.remove('lit'));
    document.getElementById('rn'+(step%r.order.length)).classList.add('lit');
    step++;
    if(step<r.steps.length){setTimeout(tick,r.steps[step]);}
    else{
      document.querySelectorAll('.roul-name').forEach(e=>e.classList.remove('lit'));
      document.getElementById('rn'+r.winnerIdx).classList.add('winner');
      confetti();
      setTimeout(done,2200);
    }
  })();
}

function confetti(){
  const colors=['var(--gold)','#e74c3c','#3498db','#2ecc71','#f39c12','#e91e8c'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=Math.random()*0.8+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

function buildRoulette(candidates,winnerName){
  const order=[...candidates].sort(()=>Math.random()-.5);
  const winnerIdx=order.indexOf(winnerName);
  const loops=2+Math.floor(Math.random()*2);
  const totalSteps=loops*order.length+winnerIdx+1;
  const steps=[];
  let d=90;
  for(let i=0;i<totalSteps;i++){
    steps.push(Math.round(d));
    const remaining=totalSteps-i;
    if(remaining<8)d*=1.35;else d*=1.02;
  }
  return{order,steps,winnerIdx};
}
function assignRoles(ch,active,allPs,aT,oT){
  const R={};let roulette=null;
  const teams=[...new Set(active.map(p=>p.team))];
  const inactive=allPs.filter(p=>!active.find(a=>a.name===p.name));
  inactive.forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa la prueba.'};});
  const rnd=arr=>arr[Math.floor(Math.random()*arr.length)];
  const shuf=arr=>[...arr].sort(()=>Math.random()-.5);

  switch(ch.rt){
    case'solo':{
      const tp=active.filter(p=>p.team===aT);
      const chosen=rnd(tp);
      if(tp.length>1)roulette=buildRoulette(tp.map(p=>p.name),chosen.name);
      tp.forEach(p=>{R[p.name]=p.name===chosen.name
        ?{label:ch.al||'PROTAGONISTA',emoji:'⭐',isSecret:false,roleDesc:ch.ad||'Tú haces el reto.',chosen:true}
        :{label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa cómo lo hace tu compañero.'};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa la prueba.'};});
      break;}
    case'mimica':{
      const tp=active.filter(p=>p.team===aT);
      const actor=rnd(tp);
      if(tp.length>1)roulette=buildRoulette(tp.map(p=>p.name),actor.name);
      const words=pick5(WORDS);
      tp.forEach(p=>{R[p.name]=p.name===actor.name
        ?{label:ch.al||'ACTOR',emoji:'🎭',isSecret:false,roleDesc:ch.ad||'Representa cada palabra por mímica.',chosen:true,words:words}
        :{label:ch.bl||'ADIVINA',emoji:'🤔',isSecret:false,roleDesc:ch.bd||'Tu equipo adivina.'};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa.'};});
      break;}
    case'chain_phrase':{
      const tp=shuf(active.filter(p=>p.team===aT));
      const phrase=rndOf(PHRASES);
      // Pick a checker from another team (or spectators) to verify at the end
      const others=allPs.filter(p=>p.team!==aT);
      const checker=others.length?rnd(others):null;
      tp.forEach((p,idx2)=>{
        const f=idx2===0,l=idx2===tp.length-1;
        if(f){
          R[p.name]={label:'PRIMERO',emoji:'1️⃣',isSecret:false,roleDesc:'Te damos una frase secreta. Memorízala y susúrrala al oído del siguiente. Solo una vez.',phrase:phrase};
        }else{
          R[p.name]={label:l?'ÚLTIMO':'#'+(idx2+1),emoji:l?'🔚':(idx2+1)+'️⃣',isSecret:false,
            roleDesc:l?'Cuando te susurren la frase, dila en VOZ ALTA para todos.':'Escucha la frase y susúrrala al siguiente. Solo una vez.'};
        }
      });
      // Checker (verifier) gets the phrase to compare at the end
      if(checker){
        R[checker.name]={label:'VERIFICADOR',emoji:'🔍',isSecret:false,roleDesc:'Al terminar la cadena, revela la frase original y compárala con lo que dijo el último jugador.',phrase:phrase,verifier:true};
      }
      // Everyone else not yet assigned = spectator
      allPs.forEach(p=>{if(!R[p.name])R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa la cadena.'};});
      break;}
    case'timer':{
      const tp=active.filter(p=>p.team===aT);
      const chosen=rnd(tp);
      if(tp.length>1)roulette=buildRoulette(tp.map(p=>p.name),chosen.name);
      tp.forEach(p=>{R[p.name]=p.name===chosen.name
        ?{label:ch.al||'CRONÓMETRO',emoji:'⏱️',isSecret:false,roleDesc:ch.ad||'Para el cronómetro a los 30 segundos.',chosen:true,timer:30}
        :{label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa si acierta los 30 segundos.'};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa la prueba.'};});
      break;}
    case'diver':{
      const tp=active.filter(p=>p.team===aT);
      const diver=rnd(tp);
      if(tp.length>1)roulette=buildRoulette(tp.map(p=>p.name),diver.name);
      const movie=rndOf(MOVIES);
      tp.forEach(p=>{R[p.name]=p.name===diver.name
        ?{label:ch.al||'BUCEADOR',emoji:'🤿',isSecret:false,roleDesc:ch.ad||'Di el título bajo el agua.',chosen:true,phrase:movie}
        :{label:ch.bl||'ADIVINA',emoji:'🤔',isSecret:false,roleDesc:ch.bd||'Adivina la película.'};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa.'};});
      break;}
    case'hunt':{
      const obj=rndOf(HOUSE_OBJECTS);
      active.filter(p=>p.team===aT).forEach(p=>{R[p.name]={label:'BUSCADOR',emoji:'🔦',isSecret:false,roleDesc:'Encontrad y traed este objeto en 60 segundos:',hunt:obj};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa la búsqueda.'};});
      break;}
    case'hunt_versus':{
      const obj=rndOf(HOUSE_OBJECTS);
      active.forEach(p=>{R[p.name]={label:'CAZADOR',emoji:'🏃',isSecret:false,roleDesc:'¡A buscar! El primer equipo que traiga este objeto gana:',hunt:obj};});
      break;}
    case'number':{
      const tp=active.filter(p=>p.team===aT);
      const chosen=rnd(tp);
      if(tp.length>1)roulette=buildRoulette(tp.map(p=>p.name),chosen.name);
      const num=1+Math.floor(Math.random()*9);
      tp.forEach(p=>{R[p.name]=p.name===chosen.name
        ?{label:ch.al||'DESCRIPTOR',emoji:'🔢',isSecret:false,roleDesc:ch.ad||'Tu número secreto:',chosen:true,phrase:'Tu número secreto es: '+num}
        :{label:ch.bl||'JURADO',emoji:'🤔',isSecret:false,roleDesc:ch.bd||'Adivina el número.'};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa.'};});
      break;}
    case'cipher':{
      const tp=active.filter(p=>p.team===aT);
      const rep=rnd(tp);
      if(tp.length>1)roulette=buildRoulette(tp.map(p=>p.name),rep.name);
      const movie=rndOf(MOVIES);
      // Build masked display: first letter + underscores for rest (preserve spaces)
      const cipher={answer:movie,revealed:[]};
      tp.forEach(p=>{R[p.name]=(p.name===rep.name)
        ?{label:ch.al||'DESCIFRADOR',emoji:'🔐',isSecret:false,roleDesc:'Pide letras (máx. 3, cada una resta 1 casilla) y resuelve cuando lo sepáis.',chosen:true,cipher:cipher,cipherRep:true}
        :{label:'EQUIPO',emoji:'🔍',isSecret:false,roleDesc:'Ayuda a adivinar la película. Solo el representante pide letras y resuelve.',cipher:cipher,cipherRep:false};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa. No reveles la película si la sabes.'};});
      break;}
    case'draw_word':{
      const tp=active.filter(p=>p.team===aT);
      const drawer=rnd(tp);
      if(tp.length>1)roulette=buildRoulette(tp.map(p=>p.name),drawer.name);
      const word=rndOf(EASY_DRAW);
      tp.forEach(p=>{R[p.name]=p.name===drawer.name
        ?{label:ch.al||'DIBUJANTE',emoji:'✍️',isSecret:false,roleDesc:ch.ad||'Dibuja la palabra en el aire.',chosen:true,phrase:word}
        :{label:ch.bl||'ADIVINA',emoji:'🤔',isSecret:false,roleDesc:ch.bd||'Adivina qué dibuja.'};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa.'};});
      break;}
    case'twister':{
      const tp=active.filter(p=>p.team===aT);
      const tw=rndOf(TWISTERS);
      tp.forEach(p=>{R[p.name]={label:'PARTICIPAS',emoji:'👅',isSecret:false,
        roleDesc:'Todos debéis decir este trabalenguas. Se permite 1 fallo; cada fallo extra resta 1 casilla.',phrase:tw};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Escucha si lo dicen bien.'};});
      break;}
    case'buzzer':{
      active.forEach(p=>{R[p.name]={label:'PULSADOR',emoji:'🔔',isSecret:false,roleDesc:'Pulsa para bloquear cuando sepas la canción. ¡Tienes 10 segundos para responder!',buzzer:true};});
      break;}
    case'hotpotato':{
      active.forEach(p=>{R[p.name]={label:'PARTICIPAS',emoji:'🥔',isSecret:false,roleDesc:'Patata caliente: di una palabra que empiece por la última sílaba de la anterior antes de que el contador llegue a 0. Mira la TV.'};});
      break;}
    case'letter_hunt':{
      // Each team gets the SAME letter shown to all its members
      const teamLetters={};
      teams.forEach(t=>{teamLetters[t]=rndOf(LETTERS);});

          :{label:ch.bl||'EQUIPO',emoji:'👥',isSecret:false,roleDesc:ch.bd||'Anima a tu representante.'};});

      let firstRep=null,cands=null;
      teams.forEach(t=>{

          :{label:ch.bl||'EQUIPO',emoji:'👥',isSecret:false,roleDesc:ch.bd||'Anima a tu representante.'};});
      });
      if(cands&&cands.length>1)roulette=buildRoulette(cands,firstRep);

    case'pair_team':{
      teams.forEach(t=>{
        const tp=shuf(active.filter(p=>p.team===t));if(!tp.length)return;

          R[tp[0].name]={label:'ATADO A',emoji:'🔗',isSecret:false,roleDesc:'Os atáis el tobillo con '+tp[1].name+'.'};

          tp.slice(2).forEach(p=>{R[p.name]={label:'LIBRE',emoji:'👟',isSecret:false,roleDesc:'La pareja de vuestro equipo os representa.'};});
        }else tp.forEach(p=>{R[p.name]={label:'PARTICIPA',emoji:'👥',isSecret:false,roleDesc:ch.d};});

      break;}
    case'sides':{
      if(teams.length>=2){
        active.filter(p=>p.team===teams[0]).forEach(p=>{R[p.name]={label:'DEFIENDE EL SÍ',emoji:'✅',isSecret:false,roleDesc:'Vuestro equipo defiende el SÍ. Argumentad con convicción.'};});

      }else active.forEach(p=>{R[p.name]={label:'PARTICIPA',emoji:'👥',isSecret:false,roleDesc:ch.d};});
      break;}
    default:
      active.forEach(p=>{R[p.name]={label:'PARTICIPA',emoji:'👥',isSecret:false,roleDesc:ch.d};});
  }
  return{roles:R,roulette};
}

  }

function handleBuzz(name,team){
  // Only accept if nobody currently locked and this team isn't vetoed
  if(buzzer.locked)return;
  if(buzzer.vetoed.includes(team))return;
  buzzer.locked=name;buzzer.lockedTeam=team;
  buzzer.deadline=Date.now()+10000;
  pub({type:'buzzState',state:buzzer});
  renderBuzzerTV();
  if(buzzerTimer)clearInterval(buzzerTimer);
  buzzerTimer=setInterval(()=>{
    renderBuzzerTV();
    if(Date.now()>=buzzer.deadline){
      handleBuzzResult(false);
    }
  },250);
}
function handleBuzzResult(success){
  if(buzzerTimer){clearInterval(buzzerTimer);buzzerTimer=null;}
  if(success){
    pub({type:'buzzWin',team:buzzer.lockedTeam,name:buzzer.locked});
    confetti();
    buzzer={locked:null,lockedTeam:null,vetoed:[],deadline:0};
    renderBuzzerTV();
  }else{
    // Veto the team that just failed until next rebound; rebound (unlock)
    const failedTeam=buzzer.lockedTeam;
    const vetoed=[...buzzer.vetoed];
    if(failedTeam&&!vetoed.includes(failedTeam))vetoed.push(failedTeam);
    // If all participating teams vetoed, clear vetoes (everyone can try again)
    const allTeams=[...new Set(Object.values(players).map(p=>p.team))];
    const stillFree=allTeams.filter(t=>!vetoed.includes(t));
    buzzer={locked:null,lockedTeam:null,vetoed:stillFree.length?vetoed:[],deadline:0};
    pub({type:'buzzState',state:buzzer});
    renderBuzzerTV();
  }
}

function hpStart(){
  hpRunning=true;
  if(hpTimer)clearInterval(hpTimer);
  hpTimer=setInterval(()=>{
    hpRemaining--;
    if(hpRemaining<=0){
      hpRemaining=0;hpRunning=false;clearInterval(hpTimer);hpTimer=null;
      renderHotPotato();
      const mp=document.getElementById('mainPanel');
      if(mp){
        const over=document.createElement('div');
        over.style.cssText='position:fixed;inset:0;background:rgba(226,27,60,.95);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;cursor:pointer';
        over.innerHTML='<div style="font-size:80px">🥔💥</div><div style="font-size:36px;font-weight:900;margin-top:10px">¡TIEMPO!</div><div style="font-size:18px;margin-top:8px;opacity:.9">El equipo de turno retrocede 5 casillas</div>';
        over.onclick=()=>over.remove();
        document.body.appendChild(over);
      }
      return;
    }
    renderHotPotato();
  },1000);
  renderHotPotato();
}
function hpStop(){hpRunning=false;if(hpTimer){clearInterval(hpTimer);hpTimer=null;}renderHotPotato();}

function renderHumming(){
  const mp=document.getElementById('mainPanel');
  if(!mp||!lastCh||lastCh.ch.rt!=='humming')return;
  const teamsIn=[lastCh.aT,lastCh.oT].filter(Boolean);
  let html='<div style="text-align:center"><div style="font-size:52px">🎤</div>';
  html+='<div style="color:var(--cat-versus);font-size:15px;font-weight:900;letter-spacing:.12em;margin:6px 0">HUMMING BATTLE</div>';
  html+='<div style="display:flex;gap:14px;justify-content:center;margin-top:14px;flex-wrap:wrap">';
  teamsIn.forEach(t=>{
    let secs;
    if(humming.running[t])secs=((Date.now()-humming.starts[t])/1000).toFixed(1);
    else if(humming.times[t]!=null)secs=humming.times[t].toFixed(1);
    else secs='—';
    const done=humming.times[t]!=null;
    const run=humming.running[t];
    html+='<div style="background:var(--card);border-radius:16px;padding:18px 22px;min-width:130px;border:2px solid '+(run?'var(--gold)':done?'#22c55e':'var(--wood)')+'">';

    html+='<div style="font-size:38px;font-weight:900;color:'+(done?'#22c55e':'var(--gold)')+'">'+secs+(secs!=='—'?'s':'')+'</div>';
    html+='</div>';
  });
  html+='</div>';
  // Winner
  const allDone=teamsIn.every(t=>humming.times[t]!=null);
  if(allDone&&teamsIn.length>=2){
    const win=teamsIn.reduce((a,b)=>humming.times[a]<humming.times[b]?a:b);
    html+='<div style="font-size:22px;font-weight:900;color:#22c55e;margin-top:16px">🏆 Gana '+teamNm(win)+'</div>';
  }
  html+='<button class="btn btn-gold" style="margin-top:18px;padding:12px 28px;font-size:15px" onclick="nextRound()">✓ Hecho — Siguiente casilla</button>';
  html+='</div>';
  mp.innerHTML=html;
}

  const host=document.getElementById('chTimerHost');
  if(!host)return;
  if(!lastCh||!lastCh.ch.secs){host.innerHTML='';return;}
  const danger=chTimerSecs<=10&&chTimerSecs>0;
  let html='<div style="margin-top:14px;background:var(--card);border:2px solid '+(danger?'#e21b3c':'var(--wood)')+';border-radius:16px;padding:18px;text-align:center">';
  html+='<div style="font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--dim);margin-bottom:6px">CRONÓMETRO</div>';
  const mm=Math.floor(chTimerSecs/60),ss=chTimerSecs%60;
  const disp=chTimerTotal>=60?(mm+':'+String(ss).padStart(2,'0')):String(chTimerSecs);
  html+='<div style="font-size:64px;font-weight:900;line-height:1;color:'+(chTimerSecs===0?'#e21b3c':danger?'#e21b3c':'var(--gold)')+'">'+disp+(chTimerTotal<60?'s':'')+'</div>';
  html+='<div style="display:flex;gap:8px;justify-content:center;margin-top:12px">';
  if(!chTimerRunning&&chTimerSecs===chTimerTotal){
    html+='<button class="btn btn-gold" style="padding:12px 28px;font-size:15px" onclick="chTimerStart()">▶ Empezar</button>';
  }else if(chTimerRunning){
    html+='<button class="btn" style="background:var(--btn-ghost-bg);color:var(--btn-ghost-color);padding:12px 24px;font-size:14px" onclick="chTimerPause()">⏸ Pausar</button>';
    html+='<button class="btn" style="background:var(--btn-ghost-bg);color:var(--btn-ghost-color);padding:12px 24px;font-size:14px" onclick="chTimerReset()">↻ Reiniciar</button>';
  }else{
    html+='<button class="btn btn-gold" style="padding:12px 24px;font-size:14px" onclick="chTimerStart()">▶ Reanudar</button>';
    html+='<button class="btn" style="background:var(--btn-ghost-bg);color:var(--btn-ghost-color);padding:12px 24px;font-size:14px" onclick="chTimerReset()">↻ Reiniciar</button>';
  }
  html+='</div></div>';
  host.innerHTML=html;
}
function chTimerStart(){
  chTimerRunning=true;
  pub({type:'timerStart'});
  if(chTimer)clearInterval(chTimer);
  chTimer=setInterval(()=>{
    chTimerSecs--;
    if(chTimerSecs<=0){
      chTimerSecs=0;chTimerRunning=false;clearInterval(chTimer);chTimer=null;
      renderChTimer();
      pub({type:'timerEnd'});
      showTimeUp();
    }else renderChTimer();
  },1000);
  renderChTimer();
}
function chTimerPause(){chTimerRunning=false;if(chTimer){clearInterval(chTimer);chTimer=null;}pub({type:'timerPause'});renderChTimer();}
function chTimerReset(){chTimerRunning=false;if(chTimer){clearInterval(chTimer);chTimer=null;}chTimerSecs=chTimerTotal;pub({type:'timerReset'});renderChTimer();}
function showTimeUp(){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(226,27,60,.95);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;cursor:pointer;animation:fadeIn .2s';
  ov.innerHTML='<div style="font-size:96px">⏰</div><div style="font-size:48px;font-weight:900;margin-top:10px">¡TIEMPO!</div>';
  ov.onclick=()=>ov.remove();
  document.body.appendChild(ov);
  confetti();
}
function getChosenNames(){
  const out=[];
  if(!lastCh||!lastCh.roles)return out;
  for(const n in lastCh.roles){if(lastCh.roles[n].chosen)out.push(n);}
  return out;
}
function candsForTeam(team){
  return Object.values(players).filter(p=>p.team===team).map(p=>p.name);
}
function swapRole(oldName,newName){
  // give oldName's chosen role to newName, oldName becomes a normal participant
  const chosenRole=lastCh.roles[oldName];
  const otherRole=lastCh.roles[newName];
  // update pair references if present
  const updated=Object.assign({},chosenRole);
  lastCh.roles[newName]=updated;
  lastCh.roles[oldName]=(otherRole&&!otherRole.chosen)?otherRole:{label:'EQUIPO',emoji:'👥',isSecret:false,roleDesc:'Ahora participas con el resto del equipo.'};
  // fix pairWith pointers on partner if any
  for(const n in lastCh.roles){
    if(lastCh.roles[n].pairWith===oldName)lastCh.roles[n].pairWith=newName;
  }
  if(updated.pairWith){updated.roleDesc='Formas pareja con '+updated.pairWith+'.';}
  pub({type:'challenge',name:lastCh.ch.n,desc:lastCh.ch.d,ctype:lastCh.type,roles:lastCh.roles,roulette:null});
  saveTV();
  renderRoles(lastCh.roles,Object.values(players));
}
function handleWildcard(name){
  const chosen=getChosenNames();
  if(!chosen.includes(name))return; // only a chosen player can wildcard
  const team=(players[name]||{}).team;
  // pool = same team, not currently chosen
  const pool=candsForTeam(team).filter(n=>!chosen.includes(n));
  if(!pool.length)return;
  const pick=pool[Math.floor(Math.random()*pool.length)];
  showStealAnim('🃏','COMODÍN','Nuevo elegido',pick);
  swapRole(name,pick);
}
function handleSteal(name){
  const chosen=getChosenNames();
  if(chosen.includes(name))return; // already chosen
  const team=(players[name]||{}).team;
  // find a chosen player on the same team to steal from
  const target=chosen.find(n=>(players[n]||{}).team===team);
  if(!target)return;
  showStealAnim('🦹','¡ROBO!',name+' roba la posición a',target);
  swapRole(target,name);
}
function showStealAnim(emoji,title,subtitle,who){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:450;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;cursor:pointer;animation:fadeIn .2s';
  ov.innerHTML='<div style="font-size:96px;animation:chPop .5s cubic-bezier(.2,1.4,.4,1)">'+emoji+'</div><div style="font-size:40px;font-weight:900;color:var(--gold);margin-top:6px">'+title+'</div><div style="font-size:18px;color:rgba(255,255,255,.7);margin-top:14px">'+subtitle+'</div><div style="font-size:32px;font-weight:900;margin-top:6px">'+who+'</div>';
  ov.onclick=()=>ov.remove();
  document.body.appendChild(ov);
  setTimeout(()=>{if(ov.parentNode)ov.remove();},3500);
  confetti();
}
function tc(t){const i='ABCDEFGH'.indexOf(t);return TC[i>=0?i:0];}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
</script>


<script>
(function(){
  var saved=localStorage.getItem('ocaTheme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  window.toggleTheme=function(){
    var next=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('ocaTheme',next);
    var btn=document.getElementById('themeToggle');
    if(btn)btn.textContent=next==='light'?'🌙':'☀️';
  };
  document.addEventListener('DOMContentLoaded',function(){
    var btn=document.getElementById('themeToggle');
    if(btn)btn.textContent=saved==='light'?'🌙':'☀️';
  });
})();
</script>
