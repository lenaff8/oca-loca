<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🪿 La Oca Loca — TV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--felt:#0d1b0f;--panel:#152318;--parch:#f0ddb0;--gold:#e8b84b;--wood:#3d2b1a}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
.screen{display:none;padding:20px;max-width:1400px;margin:0 auto}.screen.active{display:block}
.card{background:var(--panel);border:1px solid var(--wood);border-radius:16px;padding:18px}
.btn{border:none;border-radius:12px;font-weight:900;cursor:pointer;font-family:inherit;transition:transform .12s,opacity .15s}
.btn:hover{opacity:.9;transform:translateY(-1px)}.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#1a1200;padding:14px 28px;font-size:16px;box-shadow:0 4px 18px rgba(232,184,75,.35)}
.btn-back{background:rgba(240,221,176,.08);color:rgba(240,221,176,.6);padding:10px 18px;font-size:13px;border:1px solid rgba(240,221,176,.12)}
.code{font-size:clamp(2.5rem,12vw,5rem);font-weight:900;letter-spacing:.15em;color:var(--gold);text-align:center;line-height:1;text-shadow:0 0 30px rgba(232,184,75,.4)}
.label{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--dim);margin-bottom:6px}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;display:inline-block}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--chip-bg);border-radius:9px;padding:6px 12px;margin:3px;font-size:13px;animation:popIn .3s ease both}
@keyframes popIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.role-row{display:flex;align-items:center;gap:9px;padding:8px 12px;background:var(--row-bg);border-radius:9px;margin-bottom:4px;font-size:13px;animation:slideIn .35s ease both}
@keyframes slideIn{from{transform:translateX(-14px);opacity:0}to{transform:none;opacity:1}}
.status{font-size:11px;color:var(--text)55;text-align:center;margin-top:4px}
.grid2{display:grid;gap:18px;margin-top:16px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
@media(min-width:900px){.gridLobby{grid-template-columns:300px 1fr}.gridGame{grid-template-columns:280px 1fr}}

/* ── Wizard ── */
.wizard-q{font-size:24px;font-weight:900;color:#fff;text-align:center;margin-bottom:24px;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.cat-card{border:none;border-radius:20px;padding:36px 20px;cursor:pointer;font-family:inherit;text-align:center;color:#fff;transition:transform .15s,box-shadow .15s;animation:fadeUp .35s ease both}
.cat-card:hover{transform:translateY(-4px) scale(1.02)}
.cat-card:active{transform:scale(.97)}
.cat-emoji{font-size:56px;display:block;margin-bottom:10px}
.cat-name{font-size:22px;font-weight:900;letter-spacing:.02em}
.cat-sub{font-size:12px;opacity:.65;margin-top:6px;line-height:1.5}
.team-big{border:3px solid transparent;border-radius:18px;padding:28px 14px;cursor:pointer;font-family:inherit;color:#fff;font-size:26px;font-weight:900;transition:transform .12s;min-width:110px;animation:fadeUp .3s ease both}
.team-big:hover{transform:scale(1.06)}.team-big:active{transform:scale(.95)}
.team-big small{display:block;font-size:11px;font-weight:700;opacity:.7;margin-top:4px}

/* ── Slot + roulette + confetti (unchanged visuals) ── */

.slot-window{min-height:66px;overflow:visible;position:relative}
.slot-item{min-height:66px;padding:4px 12px;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,3.5vw,26px);font-weight:900;color:#fff;text-align:center;line-height:1.3}
@keyframes chPop{0%{transform:scale(.7) rotate(-2deg);opacity:0}60%{transform:scale(1.04) rotate(.5deg)}100%{transform:scale(1) rotate(0)}}
.ch-reveal{animation:chPop .55s cubic-bezier(.2,1.4,.4,1) both}
@keyframes glowPulse{0%,100%{box-shadow:0 0 24px rgba(232,184,75,.25)}50%{box-shadow:0 0 48px rgba(232,184,75,.55)}}
.roul-name{padding:12px 22px;border-radius:14px;font-size:22px;font-weight:900;background:rgba(240,221,176,.06);border:2px solid transparent;transition:all .08s;color:rgba(240,221,176,.5)}
.roul-name.lit{background:var(--gold);color:#1a1200;transform:scale(1.12);box-shadow:0 0 36px rgba(232,184,75,.7);border-color:#fff}
.roul-name.winner{background:var(--gold);color:#1a1200;transform:scale(1.25);box-shadow:0 0 60px rgba(232,184,75,.95);border-color:#fff;animation:winnerBounce .5s ease 3}
@keyframes winnerBounce{0%,100%{transform:scale(1.25)}50%{transform:scale(1.35)}}
.confetti{position:fixed;width:10px;height:10px;top:-12px;z-index:999;pointer-events:none;animation:confFall linear forwards}
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg)}}

/* ── Theme variables ── */
:root,[data-theme="dark"]{
  --bg:radial-gradient(ellipse at 50% 0%,#142517,#0d1b0f 70%);
  --panel:#152318;--card:#1d2f1f;--text:#f0ddb0;--gold:#e8b84b;
  --wood:#3d2b1a;--dim:rgba(240,221,176,.45);--dimmest:rgba(240,221,176,.12);
  --input-bg:rgba(240,221,176,.07);--chip-bg:rgba(240,221,176,.07);
  --row-bg:rgba(240,221,176,.05);--btn-ghost-bg:rgba(240,221,176,.1);
  --btn-ghost-color:#f0ddb0;--btn-ghost-border:rgba(240,221,176,.2);
  --status-color:rgba(240,221,176,.33);
}
[data-theme="light"]{
  --bg:radial-gradient(ellipse at 50% 0%,#f5e8cc,#ede0b8 70%);
  --panel:#fffcf0;--card:#fdf6e0;--text:#2a1800;--gold:#9a6200;
  --wood:#cca860;--dim:rgba(42,24,0,.5);--dimmest:rgba(42,24,0,.1);
  --input-bg:rgba(0,0,0,.06);--chip-bg:rgba(0,0,0,.06);
  --row-bg:rgba(0,0,0,.04);--btn-ghost-bg:rgba(42,24,0,.08);
  --btn-ghost-color:#2a1800;--btn-ghost-border:rgba(42,24,0,.2);
  --status-color:rgba(42,24,0,.4);
}
/* ── Theme toggle button ── */
#themeToggle{position:fixed;top:10px;right:12px;z-index:200;background:var(--panel);
  border:1px solid var(--wood);border-radius:20px;padding:6px 12px;cursor:pointer;
  font-size:16px;font-family:inherit;color:var(--text);transition:transform .12s}
#themeToggle:hover{transform:scale(1.08)}

</style>
</head>
<body>
<button id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>

<div id="sLobby" class="screen active">
  <div class="grid2 gridLobby">
    <div>
      <div class="card" style="text-align:center;padding:24px 16px;animation:glowPulse 3s ease-in-out infinite">
        <div class="label">CÓDIGO DE SALA</div>
        <div class="code" id="codeDisp">------</div>
        <p style="color:var(--text)55;font-size:12px;margin-top:8px">Escanea para unirte</p>
        <div id="qrBox" style="margin-top:12px;display:flex;justify-content:center"></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="label" style="margin-bottom:10px">EQUIPOS (<span id="teamCountL">0</span>)</div>
        <div id="teamDefList"></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input id="newTeamName" type="text" placeholder="Nombre del equipo..."
            style="flex:1;background:var(--chip-bg);border:1px solid var(--wood);border-radius:10px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit"
            onkeydown="if(event.key==='Enter')addTeam()">
          <button class="btn btn-gold" style="padding:9px 14px;font-size:14px;white-space:nowrap" onclick="addTeam()">+ Añadir</button>
        </div>
        <div id="teamListL" style="display:none"></div>
      </div>
      <button class="btn btn-gold" style="width:100%;margin-top:12px;font-size:18px;padding:16px" onclick="goGame()">▶ Empezar partida</button>
      <button class="btn btn-back" style="width:100%;margin-top:8px" onclick="newRoom()">↻ Nueva sala</button>
    </div>
    <div class="card">
      <div class="label">JUGADORES CONECTADOS (<span id="pCountL">0</span>)</div>
      <div id="pListL" style="margin-top:10px"></div>
    </div>
  </div>
</div>

<div id="sGame" class="screen">
  <div class="grid2 gridGame">
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card" style="text-align:center;padding:12px">
        <div style="display:flex;align-items:center;justify-content:center;gap:14px">
          <div>
            <div class="label">SALA</div>
            <div style="font-size:1.8rem;font-weight:900;color:var(--gold);letter-spacing:.1em" id="codeSmall"></div>
          </div>
          <div id="qrSmall"></div>
        </div>
        <div class="status" id="connStatus">●  conectado</div>
        <button class="btn btn-back" style="width:100%;margin-top:8px;font-size:11px;padding:7px" onclick="newRoom()">↻ Nueva sala</button>
      </div>
      <div class="card" style="flex:1;overflow-y:auto">
        <div class="label">JUGADORES (<span id="pCountG">0</span>)</div>
        <div id="pListG" style="margin-top:6px"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div id="mainPanel" class="card" style="min-height:380px;display:flex;flex-direction:column;justify-content:center"></div>
      <div id="rolesCard" class="card" style="display:none">
        <div class="label">ROLES (visibles en los móviles)</div>
        <div id="roleList" style="margin-top:8px"></div>
      </div>
    </div>
  </div>
</div>

<script>
const TC=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e91e8c','#1abc9c','#e67e22'];
const CH={
minijuego:[
 {n:"Tiro de Honor",d:"Haz una canasta improvisada desde donde estéis. El grupo decide el aro y la pelota. Encested antes de 3 intentos.",rt:"actor",al:"LANZADOR",ad:"Tú eres quien tiene que encestar.",bl:"ÁRBITRO",bd:"Pon el aro y decide si ha encestado."},
 {n:"Cadena Rota",d:"El primero susurra una frase al oído. Viaja por todo el equipo. El último la dice en voz alta. ¿Queda algo de la original?",rt:"chain"},

 {n:"Torre de Naipes",d:"Construid la torre más alta posible con cartas en 90 segundos.",rt:"all"},

 {n:"Trabalenguas en Cadena",d:"Un trabalenguas viaja por el equipo. Dos fallos = reto fallado.",rt:"chain"},
 {n:"Blindtest de Objetos",d:"Con los ojos vendados, toca 5 objetos e identifícalos. Solo pueden decir frío o caliente.",rt:"actor",al:"CIEGO",ad:"Te vendan los ojos. Identifica los objetos.",bl:"GUÍA",bd:"Pasad objetos. Solo podéis decir frío o caliente."},
 {n:"Arquitectos de Papel",d:"Con 5 folios sin cinta, construid el puente más largo posible. 2 minutos.",rt:"all"},
 {n:"El Cubo Imposible",d:"Lanzad un objeto blando a una papelera desde la distancia marcada. Mayoría encesta = superado.",rt:"all"},
],
evento:[
 {n:"Acústico Imperfecto",d:"Un miembro de cada equipo tararea la misma canción. Su equipo tiene 45 segundos para adivinar. Primer equipo en acertar, gana.",rt:"rep_team",al:"HUMMEADOR",ad:"Tú tarareas la canción. Sin palabras.",bl:"ADIVINA",bd:"45 segundos para adivinar la canción."},
 {n:"Funambulista Urbano",d:"Un representante por equipo recorre la distancia con un objeto en equilibrio sobre la cabeza.",rt:"rep_team",al:"FUNAMBULISTA",ad:"Tú caminas con el objeto en la cabeza.",bl:"ESPECTADOR",bd:"Animad a vuestro representante."},
 {n:"El Último Ninja",d:"Todos adoptan pose ninja. Completamente inmóviles. El primero en moverse pierde.",rt:"all"},
 {n:"Eco Salvaje",d:"Uno por equipo participa. El moderador da la primera palabra. Cada uno sigue con la última sílaba.",rt:"rep_team",al:"JUGADOR",ad:"Tú participas en el Eco Salvaje.",bl:"HINCHA",bd:"Anima a tu representante."},
 {n:"Expedición Relámpago",d:"El moderador dice una letra. Todos buscan objetos que empiecen por esa letra en 60 segundos.",rt:"all"},
 {n:"Pareja Indisoluble",d:"Un par por equipo se ata los tobillos. El moderador propone una tarea absurda.",rt:"pair_team"},

versus:[

 {n:"Tres en Raya de la Muerte",d:"Un representante por equipo. El perdedor cumple penitencia.",rt:"rep",al:"JUGADOR",ad:"Tú juegas al Tres en Raya.",bl:"PÚBLICO",bd:"Decidid la penitencia si pierde vuestro representante."},
 {n:"Cara o Cruz Extremo",d:"El equipo retador lanza la moneda. El rival elige cara o cruz. El perdedor recibe penitencia.",rt:"rep",al:"LANZADOR",ad:"Tú lanzas la moneda.",bl:"ELECTOR",bd:"Elegid cara o cruz cuando lance el rival."},
 {n:"Cara de Piedra",d:"Un representante de cada equipo llena la boca de agua. Sus equipos intentan hacerles reír.",rt:"rep",al:"CARA DE PIEDRA",ad:"Llena la boca de agua. 60 segundos sin reírte.",bl:"COMEDIANTE",bd:"Haced reír al representante rival. Sin tocarlo."},

let topic='',players={},es=null,since=0,busy=false;
let teamDefs=[];
// Wizard state
let wState='cat', wType=null, wActive=null, wOpp=null;

window.addEventListener('DOMContentLoaded',()=>{
  let code;
  const saved=localStorage.getItem('ocaTV');
  if(saved){
    try{
      const s=JSON.parse(saved);
      code=s.code;players=s.players||{};
      if(s.inGame){
        tvInGame=true;lastCh=s.lastCh||null;
        setTimeout(()=>{
          show('sGame');renderPlayers();
          if(lastCh){finalChallenge(lastCh.ch,lastCh.type);renderRoles(lastCh.roles,Object.values(players));}
          else wizardReset();
        },0);
      }
    }catch(e){localStorage.removeItem('ocaTV');}
  }
  teamDefs=JSON.parse(localStorage.getItem('ocaTeams')||'[]');
  if(!teamDefs.length)teamDefs=[{id:'A',name:'Equipo A',color:TC[0]}];
  if(!code){
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    code=Array.from({length:6},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  }
  topic='oca-'+code;
  saveTV();
  since=Math.floor(Date.now()/1000);
  document.getElementById('codeDisp').textContent=code;
  document.getElementById('codeSmall').textContent=code;

function subscribe(){
  if(es)es.close();
  es=new EventSource('https://ntfy.sh/'+topic+'/sse?since='+since);
  es.addEventListener('message',onMsg);
  es.onerror=()=>{document.getElementById('connStatus').textContent='● reconectando...';setTimeout(subscribe,3000);};
  es.onopen=()=>{const el=document.getElementById('connStatus');if(el)el.textContent='●  conectado';};
}
function onMsg(e){
  try{
    const d=JSON.parse(JSON.parse(e.data).message);
    if(d.type==='requestTeams'){pub({type:'teams',teams:teamDefs});return;}
    if(d.type==='join'){players[d.name]={name:d.name,team:d.team};saveTV();renderPlayers();
      pub({type:'teams',teams:teamDefs});if(wState==='cat'&&document.getElementById('sGame').classList.contains('active'))renderWizard();}
  }catch(err){}
}
async function pub(data){try{await fetch('https://ntfy.sh/'+topic,{method:'POST',body:JSON.stringify(data)});}catch(e){}}

function teams(){return [...new Set(Object.values(players).map(p=>p.team))].sort();}

function buildGroupedList(ps,showKick){
  if(!ps.length)return '<p style="color:var(--text)33;font-size:13px">Sin jugadores aún</p>';
  let h='';
  teamDefs.forEach(function(t){
    const tp=ps.filter(function(p){return p.team===t.id;});
    if(!tp.length)return;
    h+='<div style="margin-bottom:10px">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">';
    h+='<div class="dot" style="background:'+t.color+';width:14px;height:14px"></div>';
    h+='<span style="font-size:13px;font-weight:900;color:'+t.color+'">'+t.name+'</span>';
    h+='<span style="font-size:11px;color:var(--text)33">'+tp.length+' jug.</span>';
    h+='</div>';
    tp.forEach(function(p){
      const safe=p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      h+='<div style="display:flex;align-items:center;gap:7px;padding:3px 0 3px 20px;font-size:13px">';
      h+='<span style="flex:1">'+p.name+'</span>';
      if(showKick){
        h+='<button onclick="kickPlayer(\''+safe+'\');" style="background:#3d1010;border:none;color:#f87171;cursor:pointer;font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;font-family:inherit">✕</button>';
      }
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}
function renderPlayers(){

  document.getElementById('pCountL').textContent=ps.length;
  document.getElementById('pCountG').textContent=ps.length;

}

// ════ Launch challenge ════
function launch(){
  if(busy)return;busy=true;
  const pool=CH[wType];
  const ch=pool[Math.floor(Math.random()*pool.length)];
  const ps=Object.values(players);
  let active;
  if(wType==='minijuego')active=ps.filter(p=>p.team===wActive);
  else if(wType==='evento')active=ps;
  else active=ps.filter(p=>p.team===wActive||p.team===wOpp);
  const {roles,roulette}=assignRoles(ch,active,ps,wActive,wOpp);
  pub({type:'challenge',name:ch.n,desc:ch.d,ctype:wType,roles,roulette});
  lastCh={ch,type:wType,roles};saveTV();
  if(roulette){
    playTVRoulette(roulette,()=>{finalChallenge(ch,wType);renderRoles(roles,ps);busy=false;});
  }else{
    slotReveal(ch,wType,()=>{renderRoles(roles,ps);busy=false;});
  }
}

function nextRound(){pub({type:'clear'});lastCh=null;saveTV();wizardReset();}

function slotReveal(ch,type,done){
  const bg={minijuego:'#0d5f6e',evento:'#7c4500',versus:'#6d1b3a'}[type];
  const em={minijuego:'🎮',evento:'⚡',versus:'⚔️'}[type];
  const lb={minijuego:'MINIJUEGO',evento:'EVENTO',versus:'VERSUS'}[type];
  const names=CH[type].map(c=>c.n);
  const seq=[];
  for(let i=0;i<14;i++)seq.push(names[Math.floor(Math.random()*names.length)]);
  seq.push(ch.n);
  document.getElementById('mainPanel').innerHTML=`<div style="background:${bg};border-radius:16px;padding:40px;text-align:center">
    <div style="font-size:64px">${em}</div>
    <div style="color:rgba(255,255,255,.5);font-size:13px;font-weight:800;letter-spacing:.12em;margin:8px 0">${lb}</div>
    <div class="slot-window"><div id="slotTxt" class="slot-item" style="opacity:.8">···</div></div>
  </div>`;
  let i=0,delay=70;
  (function step(){
    document.getElementById('slotTxt').textContent=seq[i];
    i++;
    if(i<seq.length){delay*=1.18;setTimeout(step,delay);}
    else setTimeout(()=>{finalChallenge(ch,type);done();},400);
  })();
}

  document.getElementById('mainPanel').innerHTML=`<div style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">🎰</div>

function confetti(){
  const colors=['#e8b84b','#e74c3c','#3498db','#2ecc71','#f39c12','#e91e8c'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=Math.random()*0.8+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

function buildRoulette(candidates,winnerName){
  const order=[...candidates].sort(()=>Math.random()-.5);
  const winnerIdx=order.indexOf(winnerName);
  const loops=2+Math.floor(Math.random()*2);
  const totalSteps=loops*order.length+winnerIdx+1;
  const steps=[];
  let d=90;
  for(let i=0;i<totalSteps;i++){
    steps.push(Math.round(d));
    const remaining=totalSteps-i;
    if(remaining<8)d*=1.35;else d*=1.02;
  }
  return{order,steps,winnerIdx};
}
function assignRoles(ch,active,allPs,aT,oT){
  const R={};let roulette=null;
  const teams=[...new Set(active.map(p=>p.team))];
  const inactive=allPs.filter(p=>!active.find(a=>a.name===p.name));
  inactive.forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa la prueba.'};});
  const rnd=arr=>arr[Math.floor(Math.random()*arr.length)];
  const shuf=arr=>[...arr].sort(()=>Math.random()-.5);

  switch(ch.rt){
    case'all':
      active.forEach(p=>{R[p.name]={label:'PARTICIPAS',emoji:'👥',isSecret:false,roleDesc:ch.d};});
      break;
    case'actor':{
      const tp=active.filter(p=>p.team===aT);
      const actor=rnd(tp);
      if(tp.length>1)roulette=buildRoulette(tp.map(p=>p.name),actor.name);
      tp.forEach(p=>{R[p.name]=p.name===actor.name
        ?{label:ch.al,emoji:'⭐',isSecret:false,roleDesc:ch.ad,chosen:true}
        :{label:ch.bl,emoji:'👥',isSecret:false,roleDesc:ch.bd};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa.'};});
      break;}
    case'chain':{
      const tp=shuf(active.filter(p=>p.team===aT));
      tp.forEach((p,i)=>{const f=i===0,l=i===tp.length-1;
        R[p.name]={label:f?'PRIMERO':l?'ÚLTIMO':'#'+(i+1),emoji:f?'1️⃣':l?'🔚':(i+1)+'️⃣',isSecret:false,
          roleDesc:f?'Tú empiezas la cadena.':l?'Tú cierras la cadena.':'Eres el número '+(i+1)+' en la cadena.'};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa.'};});
      break;}
    case'artist_back':{
      const tp=shuf(active.filter(p=>p.team===aT));
      if(tp.length>=2){
        if(tp.length>2)roulette=buildRoulette(tp.map(p=>p.name),tp[0].name);
        R[tp[0].name]={label:'ARTISTA',emoji:'✍️',isSecret:false,roleDesc:'Dibuja con el dedo en la espalda de '+tp[1].name+'.',chosen:true};
        R[tp[1].name]={label:'RECEPTOR',emoji:'🔮',isSecret:false,roleDesc:'Te dibujan en la espalda. Adivina qué es.'};
        tp.slice(2).forEach(p=>{R[p.name]={label:'ADIVINA',emoji:'🤔',isSecret:false,roleDesc:'Tú también intentas adivinar.'};});
      }else tp.forEach(p=>{R[p.name]={label:'PARTICIPA',emoji:'👥',isSecret:false,roleDesc:ch.d};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa.'};});
      break;}
    case'mirror':{
      const tp=shuf(active.filter(p=>p.team===aT));
      if(tp.length>=2){
        R[tp[0].name]={label:'LÍDER',emoji:'🎭',isSecret:false,roleDesc:'Haz movimientos lentos. '+tp[1].name+' te copiará.'};
        R[tp[1].name]={label:'ESPEJO',emoji:'🪞',isSecret:false,roleDesc:'Copia cada movimiento de '+tp[0].name+'.'};
        tp.slice(2).forEach(p=>{R[p.name]={label:'JURADO',emoji:'⭐',isSecret:false,roleDesc:'Evaluad la sincronía.'};});
      }else tp.forEach(p=>{R[p.name]={label:'PARTICIPA',emoji:'👥',isSecret:false,roleDesc:ch.d};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'JURADO',emoji:'⭐',isSecret:false,roleDesc:'Evaluad.'};});
      break;}
    case'pair':{
      const tp=shuf(active.filter(p=>p.team===aT));
      if(tp.length>=2){
        R[tp[0].name]={label:'PAREJA A',emoji:'🤝',isSecret:false,roleDesc:'Formas pareja con '+tp[1].name+'.'};
        R[tp[1].name]={label:'PAREJA B',emoji:'🤝',isSecret:false,roleDesc:'Formas pareja con '+tp[0].name+'.'};
        tp.slice(2).forEach(p=>{R[p.name]={label:'APOYO',emoji:'👥',isSecret:false,roleDesc:'Animad a la pareja.'};});
      }else tp.forEach(p=>{R[p.name]={label:'PARTICIPA',emoji:'👥',isSecret:false,roleDesc:ch.d};});
      active.filter(p=>p.team!==aT).forEach(p=>{R[p.name]={label:'ESPECTADOR',emoji:'👁️',isSecret:false,roleDesc:'Observa.'};});
      break;}
    case'assassin':{
      const killer=rnd(active);
      active.forEach(p=>{R[p.name]=p.name===killer.name
        ?{label:'ERES EL ASESINO',emoji:'🗡️',isSecret:true,roleDesc:'Guiña el ojo a los demás uno a uno. Que no te pillen. Las víctimas esperan 5 segundos antes de caer.'}
        :{label:'VÍCTIMA',emoji:'😇',isSecret:true,roleDesc:'Si alguien te guiña el ojo, espera 5 segundos y cae dramáticamente. Si sabes quién es el asesino, di ¡Acusación!'};});
      break;}
    case'rep':{
      let firstRep=null,cands=null;
      [aT,oT].filter(Boolean).forEach(t=>{
        const tp=active.filter(p=>p.team===t);if(!tp.length)return;
        const rep=rnd(tp);
        if(!firstRep){firstRep=rep.name;cands=tp.map(p=>p.name);}
        tp.forEach(p=>{R[p.name]=p.name===rep.name
          ?{label:ch.al||'REPRESENTANTE',emoji:'⭐',isSecret:false,roleDesc:ch.ad||'Tú compites por tu equipo.',chosen:true}
          :{label:ch.bl||'EQUIPO',emoji:'👥',isSecret:false,roleDesc:ch.bd||'Anima a tu representante.'};});
      });
      if(cands&&cands.length>1)roulette=buildRoulette(cands,firstRep);
      break;}
    case'rep_team':{
      let firstRep=null,cands=null;
      teams.forEach(t=>{
        const tp=active.filter(p=>p.team===t);if(!tp.length)return;
        const rep=rnd(tp);
        if(!firstRep){firstRep=rep.name;cands=tp.map(p=>p.name);}
        tp.forEach(p=>{R[p.name]=p.name===rep.name
          ?{label:ch.al||'REPRESENTANTE',emoji:'⭐',isSecret:false,roleDesc:ch.ad||'Tú participas por tu equipo.',chosen:true}
          :{label:ch.bl||'EQUIPO',emoji:'👥',isSecret:false,roleDesc:ch.bd||'Anima a tu representante.'};});
      });
      if(cands&&cands.length>1)roulette=buildRoulette(cands,firstRep);
      break;}
    case'pair_team':{
      teams.forEach(t=>{
        const tp=shuf(active.filter(p=>p.team===t));if(!tp.length)return;
        if(tp.length>=2){
          R[tp[0].name]={label:'ATADO A',emoji:'🔗',isSecret:false,roleDesc:'Os atáis el tobillo con '+tp[1].name+'.'};
          R[tp[1].name]={label:'ATADO B',emoji:'🔗',isSecret:false,roleDesc:'Os atáis el tobillo con '+tp[0].name+'.'};
          tp.slice(2).forEach(p=>{R[p.name]={label:'LIBRE',emoji:'👟',isSecret:false,roleDesc:'La pareja de vuestro equipo os representa.'};});
        }else tp.forEach(p=>{R[p.name]={label:'PARTICIPA',emoji:'👥',isSecret:false,roleDesc:ch.d};});
      });
      break;}
    case'sides':{
      if(teams.length>=2){
        active.filter(p=>p.team===teams[0]).forEach(p=>{R[p.name]={label:'DEFIENDE EL SÍ',emoji:'✅',isSecret:false,roleDesc:'Vuestro equipo defiende el SÍ. Argumentad con convicción.'};});
        active.filter(p=>p.team===teams[1]).forEach(p=>{R[p.name]={label:'DEFIENDE EL NO',emoji:'❌',isSecret:false,roleDesc:'Vuestro equipo defiende el NO. Argumentad con convicción.'};});
        teams.slice(2).forEach(t=>{active.filter(p=>p.team===t).forEach(p=>{R[p.name]={label:'JURADO',emoji:'⚖️',isSecret:false,roleDesc:'Votáis al equipo más convincente.'};});});
      }else active.forEach(p=>{R[p.name]={label:'PARTICIPA',emoji:'👥',isSecret:false,roleDesc:ch.d};});
      break;}
    default:
      active.forEach(p=>{R[p.name]={label:'PARTICIPA',emoji:'👥',isSecret:false,roleDesc:ch.d};});
  }
  return{roles:R,roulette};
}

function tc(t){const i='ABCDEFGH'.indexOf(t);return TC[i>=0?i:0];}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
</script>

<script>
// ── Theme ──
(function(){
  const saved=localStorage.getItem('ocaTheme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  window.toggleTheme=function(){
    const next=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('ocaTheme',next);
    document.getElementById('themeToggle').textContent=next==='light'?'🌙':'☀️';
  };
  document.addEventListener('DOMContentLoaded',function(){
    const btn=document.getElementById('themeToggle');
    if(btn)btn.textContent=saved==='light'?'🌙':'☀️';
  });
})();
</script>
